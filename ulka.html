<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOGUE: Nastya Edition</title>

<!-- Подключаем Bodoni Moda (идеален для Vogue) и Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #000000;
  color: white;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden; /* Никакого бокового скролла */
}

/* ОБЛОЖКА */
.magazine-cover {
  position: relative;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 50px;
}

/* ВЫТЯНУТЫЙ ТОНКИЙ VOGUE */
.vogue-title {
  font-family: 'Bodoni Moda', serif;
  font-size: 32vw;
  font-weight: 400;
  text-transform: uppercase;
  margin: 20px 0 0 0;
  line-height: 0.8;
  letter-spacing: -2px;
  transform: scaleY(1.4); /* Еще сильнее вытягиваем */
  color: white;
  text-align: center;
}

.edition-info {
  font-weight: 100;
  text-transform: uppercase;
  letter-spacing: 6px;
  font-size: 10px;
  margin-top: 40px;
  margin-bottom: 20px;
  opacity: 0.8;
}

/* ГЛАВНОЕ ФОТО */
.main-photo {
  width: 90%; /* Небольшие поля по бокам для стиля */
  height: auto;
  border-radius: 2px;
  margin-bottom: 40px;
}

/* ЗАГОЛОВКИ-ВЫНОСЫ */
.article-preview {
  width: 100%;
  padding: 0 25px;
  margin-bottom: 120px; /* Расстояние между заголовками для эффекта появления */
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease-out;
}

.article-preview.visible {
  opacity: 1;
  transform: translateY(0);
}

.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; max-width: 70%; }
.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; max-width: 70%; }

.article-preview h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 10px;
  font-weight: 300;
}

.article-preview p {
  font-size: 18px;
  line-height: 1.3;
  margin: 0;
  font-weight: 200;
  font-family: 'Bodoni Moda', serif;
  font-style: italic;
}

/* КОНТЕНТ НИЖЕ */
.media-section {
  padding: 40px 20px;
  background: #000;
}

.media-section h2 {
  font-family: 'Bodoni Moda', serif;
  font-size: 24px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 5px;
  margin-bottom: 30px;
}

video {
  width: 100%;
  margin-bottom: 30px;
  outline: none;
}

.astro-img {
  width: 100%;
  height: auto;
}
</style>
</head>
<body>

  <div class="magazine-cover">
    <h1 class="vogue-title">VOGUE</h1>
    <div class="edition-info">Nastya Edition — Special Birthday Issue</div>
    
    <img src="1.jpg" class="main-photo" alt="Cover Photo">

    <!-- Заголовок 1 -->
    <div class="article-preview left">
      <h3>Career</h3>
      <p>Великая девушка, покорившая проектировку кинозалов</p>
    </div>

    <!-- Заголовок 2 -->
    <div class="article-preview right">
      <h3>Top 10</h3>
      <p>Как оштрафовать вас за неправильную парковку</p>
    </div>

    <!-- Заголовок 3 -->
    <div class="article-preview left">
      <h3>Gaming</h3>
      <p>Детка геймер занимает лидирующие позиции. В чем секрет?</p>
    </div>
  </div>

  <section class="media-section">
    <h2>Special Movie</h2>
    <video controls playsinline>
      <source src="video1.mp4" type="video/mp4">
    </video>

    <h2>Stars Alignment</h2>
    <img src="astro.png" class="astro-img" alt="Astro">
  </section>

<script>
  // Функция для появления элементов при скролле
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.article-preview').forEach(block => {
    observer.observe(block);
  });
</script>

</body>
</html>
