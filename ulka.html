<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<!-- Добавили viewport-fit=cover для корректного отображения на iPhone -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VOGUE: Nastya Edition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

/* ГЛОБАЛЬНЫЕ НАСТРОЙКИ ДЛЯ ПРЕДОТВРАЩЕНИЯ СКРОЛЛА */
* {
  box-sizing: border-box; /* Учитываем отступы в ширине */
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  max-width: 100vw;
  overflow-x: hidden; /* ЗАПРЕТ ГОРИЗОНТАЛЬНОГО СКРОЛЛА */
  background: #000000;
  font-family: 'Playfair Display', serif;
  color: white;
  -webkit-font-smoothing: antialiased;
}

/* ===== ОБЛОЖКА ===== */
.cover {
  position: relative;
  width: 100%;
  height: 100vh; /* Ровно высота экрана */
  display: flex;
  overflow: hidden;
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Заполняет экран без искажений */
  display: block;
}

.cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.4) 0%,
    transparent 50%,
    rgba(0,0,0,0.8) 100%
  );
}

.cover-text {
  position: absolute;
  bottom: 10%; /* Опустил чуть ниже, на мобилках так удобнее */
  left: 20px;
  right: 20px; /* Чтобы текст не упирался в правый край */
  z-index: 2;
}

.cover-text h1 {
  font-size: clamp(50px, 18vw, 100px); 
  margin: 0;
  letter-spacing: 5px;
  text-transform: uppercase;
  font-weight: 700;
  line-height: 0.9;
}

.cover-text p {
  font-size: 1rem;
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: 0.8;
}

/* ===== КОНТЕНТ ===== */
section {
  padding: 60px 20px;
  width: 100%;
  max-width: 100%; /* Гарантируем, что секция не шире экрана */
  margin: 0 auto;
}

h2 {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 30px;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #ff8fa3;
}

/* ВИДЕО */
.video-block {
  display: flex;
  flex-direction: column;
  gap: 25px;
  align-items: center;
}

video {
  width: 100%;
  max-width: 100%; /* Чтобы видео не вылезало */
  border-radius: 8px;
  background: #000;
}

/* АСТРО */
.astro {
  text-align: center;
}

.astro img {
  width: 100%;
  height: auto;
  max-width: 100%;
  border-radius: 10px;
}

.fade-in {
  animation: fadeIn 1.5s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="fade-in">
  <!-- ОБЛОЖКА -->
  <section class="cover">
    <img src="1.jpg" alt="Nastya">
    <div class="cover-text">
      <h1>VOGUE</h1>
      <p>Nastya Edition<br>Special Birthday Issue</p>
    </div>
  </section>

  <!-- ВИДЕО -->
  <section class="video-block">
    <h2>The Movie</h2>
    <video controls playsinline poster="preview1.jpg">
      <source src="video1.mp4" type="video/mp4">
    </video>
    
    <video controls playsinline poster="preview2.jpg">
      <source src="video2.mp4" type="video/mp4">
    </video>
  </section>

  <!-- АСТРО -->
  <section class="astro">
    <h2>Stars Alignment</h2>
    <img src="astro.png" alt="Compatibility">
    <p style="margin-top: 20px; font-style: italic; opacity: 0.7; font-size: 0.9rem;">
      Твой личный код судьбы.
    </p>
  </section>
</div>

</body>
</html>
