<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gift Magazine</title>

<style>

body {
  margin: 0;
  background: #000000;
  font-family: Georgia, serif;
  color: white;
}

/* ===== ОБЩИЕ СЕКЦИИ ===== */
section {
  padding: 80px 10%;
  box-sizing: border-box;
}

/* ===== ОБЛОЖКА ===== */
.cover {
  background: #000000;
}

/* фото НЕ фон, а обычный элемент */
.cover img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 10px;
}

/* текст под фото (журнальный стиль) */
.cover h1 {
  margin-top: 20px;
  font-size: 40px;
  letter-spacing: 2px;
}

.cover p {
  font-size: 18px;
  opacity: 0.8;
  margin-top: 10px;
}

/* ===== ВИДЕО БЛОК ===== */
.video-block {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

video {
  width: 100%;
  max-width: 800px;
  border-radius: 15px;
}

/* ===== АСТРО ===== */
.astro {
  text-align: center;
}

.astro img {
  width: 100%;
  max-width: 600px;
  border-radius: 15px;
}

</style>
</head>

<body>

<!-- ===== ОБЛОЖКА ===== -->
<section class="cover">

  <img src="1.jpg">

  <h1>VOGUE GIFT EDITION</h1>

  <p>
    мини-история / подпись / эмоции от друга
  </p>

</section>

<!-- ===== ВИДЕО 1 ===== -->
<section class="video-block">

  <video controls>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <video controls>
    <source src="video2.mp4" type="video/mp4">
  </video>

</section>

<!-- ===== НАТАЛЬНАЯ КАРТА ===== -->
<section class="astro">

  <h2>Совместимость</h2>

  <img src="astro.png">

</section>

</body>
</html>
