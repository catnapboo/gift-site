<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gift Page</title>

<style>

/* ===== ОБЩИЙ ФОН САЙТА ===== */
body {
  margin: 0;
  background: #000000;
  font-family: Georgia, serif;
  color: white;
}

/* ===== ОБЩАЯ СЕКЦИЯ ===== */
section {
  padding: 60px 10%;
  box-sizing: border-box;
}

/* ===== ОБЛОЖКА (ПЕРВЫЙ ЭКРАН) ===== */
.cover {
  height: 100vh;
  position: relative;
}

/* ===== ФОТО (ВАЖНО) ===== */
/*
  ВАЖНО:
  - 1.jpg должен лежать рядом с ulka.html
*/
.cover img {
  width: 100%;      /* растянуть по ширине экрана */
  height: auto;     /* сохранить пропорции */
  display: block;   /* убрать отступ снизу */
}

/* затемнение поверх фото (эффект журнала) */
.cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.25);
}

/* текст поверх фото */
.cover h1 {
  position: absolute;
  bottom: 40px;
  left: 40px;
  font-size: 40px;
  z-index: 2;
  letter-spacing: 2px;
}

/* ===== ВИДЕО БЛОК ===== */
.video-block {
  display: flex;
  flex-direction: column;
  gap: 30px;
  align-items: center;
}

video {
  width: 100%;
  max-width: 800px;
  border-radius: 15px;
}

/* ===== ТЕКСТ ===== */
.text-block {
  font-size: 18px;
  line-height: 1.6;
  opacity: 0.9;
}

/* ===== АСТРОЛОГИЯ ===== */
.astro {
  text-align: center;
}

.astro img {
  width: 100%;
  max-width: 600px;
  border-radius: 15px;
}

</style>
</head>

<body>

<!-- ===== ОБЛОЖКА ===== -->
<section class="cover">

  <!-- ТВОЁ ФОТО -->
  <img src="1.jpg">

  <!-- ТЕКСТ -->
  <h1>VOGUE GIFT EDITION</h1>

</section>

<!-- ===== ВИДЕО ===== -->
<section class="video-block">

  <video controls>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <video controls>
    <source src="video2.mp4" type="video/mp4">
  </video>

</section>

<!-- ===== ТЕКСТ ===== -->
<section class="text-block">
  <h2>Поздравление</h2>
  <p>
    Здесь будет текст от друга, история, эмоции и пожелания.
  </p>
</section>

<!-- ===== АСТРО ===== -->
<section class="astro">
  <h2>Совместимость</h2>
  <img src="astro.png">
</section>

</body>
</html>
