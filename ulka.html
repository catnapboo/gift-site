<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOGUE: Nastya Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96@400;1,6..96@400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #000000;
  color: white;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* ОБЛОЖКА */
.magazine-cover {
  position: relative;
  width: 100%;
  height: 110vh; /* Чуть больше экрана для хода скролла */
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

/* ФОТО КАК ПОДЛОЖКА */
.main-photo {
  position: absolute;
  top: 15%; /* Опустили фото чуть ниже */
  width: 100%;
  height: 85%;
  object-fit: cover;
  z-index: 1;
  opacity: 0;
  transition: opacity 2s ease-in-out;
}

/* ШАПКА */
.header-group {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-top: 5vh;
  opacity: 0;
  transform: translateY(-20px);
  transition: all 1.5s ease-out;
}

.vogue-title {
  font-family: 'Bodoni Moda', serif;
  font-size: 30vw;
  font-weight: 400;
  text-transform: uppercase;
  margin: 0;
  line-height: 0.8;
  transform: scaleY(1.5);
  letter-spacing: -2px;
}

.edition-info {
  font-weight: 100;
  text-transform: uppercase;
  letter-spacing: 8px;
  font-size: 10px;
  margin-top: 40px;
}

/* ЗАГОЛОВКИ ПОВЕРХ ФОТО */
.features-overlay {
  position: absolute;
  top: 45%; /* Располагаем поверх фото */
  width: 100%;
  z-index: 15;
  padding: 0 20px;
}

.feature {
  max-width: 220px;
  margin-bottom: 80px;
  opacity: 0;
  transform: translateY(30px);
  transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }

.feature h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; font-weight: 300; }
.feature p { font-size: 16px; font-family: 'Bodoni Moda', serif; font-style: italic; margin: 0; font-weight: 200; line-height: 1.2;}

/* СЕКЦИИ КОНТЕНТА */
.media-section {
  position: relative;
  z-index: 20;
  background: #000;
  padding: 80px 20px;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1.5s ease-out;
}

.media-section.visible { opacity: 1; transform: translateY(0); }

.media-section h2 {
  font-family: 'Bodoni Moda', serif;
  font-size: 24px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 4px;
  margin-bottom: 40px;
}

video { width: 100%; border-radius: 2px; margin-bottom: 60px; }
.astro-img { width: 100%; height: auto; }

/* КЛАСС ДЛЯ АКТИВАЦИИ АНИМАЦИИ */
.appear { opacity: 1 !important; transform: translateY(0) !important; }
</style>
</head>
<body>

  <div class="magazine-cover">
    <div class="header-group" id="mainHeader">
      <h1 class="vogue-title">VOGUE</h1>
      <div class="edition-info">Nastya Edition — Special Issue</div>
    </div>
    
    <img src="1.jpg" class="main-photo" id="bgPhoto" alt="Cover">

    <div class="features-overlay">
      <div class="feature left" id="feat1">
        <h3>Career</h3>
        <p>Великая девушка, покорившая проектировку кинозалов</p>
      </div>
      <div class="feature right" id="feat2">
        <h3>Top 10</h3>
        <p>Как оштрафовать вас за неправильную парковку</p>
      </div>
      <div class="feature left" id="feat3">
        <h3>Gaming</h3>
        <p>Детка геймер в топах мира. В чем секрет?</p>
      </div>
    </div>
  </div>

  <section class="media-section" id="bottomSection">
    <h2>The Exclusive Movie</h2>
    <video controls playsinline>
      <source src="video1.mp4" type="video/mp4">
    </video>

    <h2>Stars Alignment</h2>
    <img src="astro.png" class="astro-img" alt="Astro">
  </section>

<script>
  // 1. Плавное появление при загрузке (шапка и фото)
  window.onload = () => {
    setTimeout(() => {
      document.getElementById('mainHeader').classList.add('appear');
      document.getElementById('bgPhoto').style.opacity = '1';
    }, 500);
  };

  // 2. Появление подзаголовков ПРИ НАЧАЛЕ СКРОЛЛА
  let scrolled = false;
  window.addEventListener('scroll', () => {
    if (!scrolled) {
      scrolled = true;
      // Запускаем каскадное появление заголовков на обложке
      setTimeout(() => document.getElementById('feat1').classList.add('appear'), 200);
      setTimeout(() => document.getElementById('feat2').classList.add('appear'), 700);
      setTimeout(() => document.getElementById('feat3').classList.add('appear'), 1200);
    }

    // 3. Появление нижних секций (видео, карта) при доскролле до них
    const bottomSection = document.getElementById('bottomSection');
    const rect = bottomSection.getBoundingClientRect();
    if (rect.top < window.innerHeight * 0.8) {
      bottomSection.classList.add('appear');
    }
  });
</script>

</body>
</html>
