<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gift Magazine</title>

<style>

/* ===== БАЗА СТРАНИЦЫ ===== */
body {
  margin: 0;
  background: #000000;
  font-family: Georgia, serif;
  color: white;
}

/* ===== ОБЩИЕ СЕКЦИИ ===== */
section {
  padding: 80px 10%;
  box-sizing: border-box;
}

/* ===== ОБЛОЖКА (1 ЭКРАН) ===== */
.cover {
  height: 100vh; /* только первый экран */
  position: relative;
  overflow: hidden;
}

/* фото на обложке */
.cover img {
  width: 100%;
  height: auto;
  overflow: hidden;
}

/* затемнение как в журналах */
.cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* текст поверх обложки */
.cover h1 {
  position: absolute;
  bottom: 60px;
  left: 60px;
  font-size: 50px;
  z-index: 2;
  letter-spacing: 3px;
}

/* ===== ВИДЕО БЛОК ===== */
.video-block {
  display: flex;
  flex-direction: column;
  gap: 40px;
  align-items: center;
}

video {
  width: 100%;
  max-width: 800px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* ===== ТЕКСТ БЛОК ===== */
.text-block {
  font-size: 20px;
  line-height: 1.6;
  opacity: 0.9;
}

/* ===== АСТРОЛОГИЯ ===== */
.astro {
  text-align: center;
}

.astro img {
  width: 100%;
  max-width: 600px;
  border-radius: 20px;
}

</style>
</head>

<body>

<!-- ================= ОБЛОЖКА ================= -->
<section class="cover">
  <img src="1.jpg">
  <h1>VOGUE GIFT EDITION</h1>
</section>

<!-- ================= ВИДЕО ================= -->
<section class="video-block">

  <video controls>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <video controls>
    <source src="video2.mp4" type="video/mp4">
  </video>

</section>

<!-- ================= ТЕКСТ ================= -->
<section class="text-block">
  <h2>Message</h2>
  <p>
    Здесь будет текст от друга, поздравления, истории, эмоции.
    Можно вставлять длинный текст, это уже как журнал.
  </p>
</section>

<!-- ================= АСТРОЛОГИЯ ================= -->
<section class="astro">
  <h2>Совместимость</h2>
  <img src="astro.png">
</section>

</body>
</html>
