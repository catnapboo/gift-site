<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VOGUE: Nastya Edition</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  overflow-x: hidden;
  background: #0a0809;
  font-family: 'Montserrat', sans-serif;
  color: white;
  scroll-behavior: smooth;
}

/* ===== ОБЛОЖКА ===== */
.cover {
  position: relative;
  width: 100%;
  height: 110vh; /* Чуть выше экрана, чтобы был запас для скролла */
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #000000;
}

/* ГЛАВНЫЙ ЗАГОЛОВОК VOGUE (ВЫТЯНУТЫЙ) */
.vogue-title {
  position: fixed; /* Заголовок остается на месте какое-то время */
  top: 2%;
  width: 100%;
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 28vw;
  font-weight: 400;
  letter-spacing: 2px;
  margin: 0;
  line-height: 1;
  z-index: 10;
  /* Вытягиваем шрифт по вертикали */
  transform: scaleY(1.3);
  text-transform: uppercase;
  pointer-events: none;
}

.edition-text {
  position: absolute;
  top: 22%;
  width: 100%;
  text-align: center;
  font-weight: 100;
  text-transform: uppercase;
  letter-spacing: 10px;
  font-size: 0.7rem;
  z-index: 11;
  opacity: 0.8;
}

/* ФОТО (СМЕЩЕНО НИЖЕ) */
.cover img {
  width: 100%;
  height: 85vh;
  object-fit: cover;
  margin-top: 25vh; /* Опускаем фото ниже заголовка */
  z-index: 5;
}

/* БОКОВЫЕ ЗАГОЛОВКИ */
.cover-features {
  position: absolute;
  width: 100%;
  top: 35vh; /* Поднимаем область с заголовками выше */
  z-index: 12;
  padding: 0 20px;
}

.feature {
  max-width: 200px;
  margin-bottom: 60vh; /* Огромный отступ, чтобы они появлялись по очереди при скролле */
  opacity: 0;
  transform: translateY(30px);
  transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.feature.left { float: left; text-align: left; border-left: 1px solid rgba(255,255,255,0.4); padding-left: 10px; clear: both; }
.feature.right { float: right; text-align: right; border-right: 1px solid rgba(255,255,255,0.4); padding-right: 10px; clear: both; }

.feature h3 {
  font-size: 0.65rem;
  text-transform: uppercase;
  margin: 0 0 8px 0;
  letter-spacing: 2px;
  font-weight: 300;
  color: #ccc;
}

.feature p {
  font-size: 0.9rem;
  line-height: 1.3;
  margin: 0;
  font-weight: 200;
}

.feature.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ===== СЕКЦИИ НИЖЕ ===== */
.content {
  position: relative;
  z-index: 20;
  background: #0a0809;
  padding: 50px 20px;
  margin-top: -10vh; /* Нахлест на фото */
}

video {
  width: 100%;
  margin-bottom: 40px;
  border-radius: 2px;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  text-transform: uppercase;
  letter-spacing: 5px;
  text-align: center;
  margin-bottom: 30px;
}
</style>
</head>

<body>

  <h1 class="vogue-title">VOGUE</h1>
  
  <div class="cover">
    <div class="edition-text">Nastya Edition — Special Issue</div>
    <img src="1.jpg" alt="Nastya">

    <div class="cover-features">
      <div class="feature left" style="margin-top: 10vh;">
        <h3>Career</h3>
        <p>Великая девушка, покорившая проектировку кинозалов</p>
      </div>

      <div class="feature right">
        <h3>Top 10</h3>
        <p>Как оштрафовать вас за неправильную парковку</p>
      </div>

      <div class="feature left">
        <h3>Gaming</h3>
        <p>Детка геймер занимает позиции в топах. В чем секрет?</p>
      </div>
    </div>
  </div>

  <section class="content">
    <h2>Special Video</h2>
    <video controls playsinline poster="preview1.jpg">
      <source src="video1.mp4" type="video/mp4">
    </video>
    
    <h2>Compatibility</h2>
    <img src="astro.png" style="width: 100%; height: auto; border-radius: 5px;">
  </section>

<script>
  const observerOptions = {
    threshold: 0.2 // Появляется, когда 20% элемента в зоне видимости
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, observerOptions);

  document.querySelectorAll('.feature').forEach(el => observer.observe(el));
</script>

</body>
</html>
