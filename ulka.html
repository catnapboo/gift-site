<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOGUE: Nastya Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #000000;
  color: white;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ОБЛОЖКА БЕЗ АНИМАЦИЙ */
.magazine-cover {
  position: relative;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #000;
}

.vogue-title {
  font-family: 'Bodoni Moda', serif;
  font-size: 32vw;
  font-weight: 400;
  text-transform: uppercase;
  margin: 60px 0 0 0;
  line-height: 0.8;
  letter-spacing: -2px;
  transform: scaleY(1.4);
  color: white;
  text-align: center;
}

.edition-info {
  font-weight: 100;
  text-transform: uppercase;
  letter-spacing: 6px;
  font-size: 10px;
  margin-top: 50px;
  margin-bottom: 30px;
  z-index: 20;
}

.main-photo {
  width: 100%;
  height: 85vh;
  object-fit: cover;
  display: block;
}

/* ПОДЗАГОЛОВКИ ПЕРЕНЕСЕНЫ ВЫШЕ */
.features-overlay {
  position: absolute;
  top: 180px; /* Сразу под "Special Issue" */
  width: 100%;
  z-index: 25;
  padding: 0 20px;
  pointer-events: none;
}

.feature {
  max-width: 200px;
  margin-bottom: 25px; /* Сделали ближе друг к другу по высоте */
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }

.feature h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; margin: 0 0 5px 0; font-weight: 300; }
.feature p { font-size: 16px; font-family: 'Bodoni Moda', serif; font-style: italic; margin: 0; line-height: 1.2; font-weight: 200; }

.visible { opacity: 1 !important; transform: translateY(0) !important; }

/* НИЖНИЕ СЕКЦИИ */
.media-section {
  padding: 80px 20px;
  background: #000;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.media-section h2 {
  font-family: 'Bodoni Moda', serif;
  font-size: 24px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 5px;
  margin-bottom: 40px;
}

video { width: 100%; border-radius: 2px; margin-bottom: 60px; }
.astro-img { width: 100%; height: auto; }

</style>
</head>
<body>

  <div class="magazine-cover">
    <h1 class="vogue-title">VOGUE</h1>
    <div class="edition-info">Nastya Edition — Special Issue</div>
    
    <img src="1.jpg" class="main-photo" alt="Cover Photo">

    <div class="features-overlay">
      <div class="feature left" id="f1">
        <h3>Career</h3>
        <p>Великая девушка, покорившая проектировку кинозалов</p>
      </div>
      <div class="feature right" id="f2">
        <h3>Top 10</h3>
        <p>Как оштрафовать вас за неправильную парковку</p>
      </div>
      <div class="feature left" id="f3">
        <h3>Gaming</h3>
        <p>Детка геймер в топах мира. В чем секрет?</p>
      </div>
    </div>
  </div>

  <section class="media-section" id="animatedMedia">
    <h2>Special Movie</h2>
    <video controls playsinline>
      <source src="video1.mp4" type="video/mp4">
    </video>

    <h2>Stars Alignment</h2>
    <img src="astro.png" class="astro-img" alt="Astro">
  </section>

<script>
  // Появление подзаголовков при начале скролла
  let scrolled = false;
  window.addEventListener('scroll', () => {
    if (!scrolled) {
      scrolled = true;
      // Запускаем появление по очереди
      setTimeout(() => document.getElementById('f1').classList.add('visible'), 100);
      setTimeout(() => document.getElementById('f2').classList.add('visible'), 400);
      setTimeout(() => document.getElementById('f3').classList.add('visible'), 700);
    }

    // Проявление нижней секции
    const media = document.getElementById('animatedMedia');
    if (media.getBoundingClientRect().top < window.innerHeight * 0.8) {
      media.classList.add('visible');
    }
  });
</script>

</body>
</html>
