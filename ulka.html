<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Gift Magazine</title>

<style>

body {
  margin: 0;
  background: #000000;
  font-family: Georgia, serif;
  color: white;
}

/* ===== ОБЛОЖКА ===== */
.cover {
  position: relative;
  width: 100%;
}

/* ФОТО ВО ВСЮ ШИРИНУ БЕЗ ОБРЕЗКИ */
.cover img {
  width: 100%;
  height: auto;
  display: block;
}

/* ТЁМНЫЙ ГРАДИЕНТ ДЛЯ ЧИТАЕМОСТИ ТЕКСТА */
.cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.4),
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.6)
  );
}

/* ТЕКСТ ПОВЕРХ ФОТО */
.cover-text {
  position: absolute;
  top: 40px;
  left: 40px;
  z-index: 2;
  max-width: 70%;
}

/* ГЛАВНЫЙ ЗАГОЛОВОК (как VOGUE) */
.cover-text h1 {
  font-size: 60px;
  margin: 0;
  letter-spacing: 3px;
}

/* ПОДЗАГОЛОВКИ */
.cover-text p {
  font-size: 18px;
  margin-top: 10px;
  opacity: 0.9;
  line-height: 1.5;
}

/* ===== СЕКЦИИ НИЖЕ ===== */
section {
  padding: 80px 10%;
  box-sizing: border-box;
}

/* ВИДЕО */
.video-block {
  display: flex;
  flex-direction: column;
  gap: 40px;
}

video {
  width: 100%;
  max-width: 800px;
  border-radius: 15px;
}

/* АСТРО */
.astro {
  text-align: center;
}

.astro img {
  width: 100%;
  max-width: 600px;
  border-radius: 15px;
}

</style>
</head>

<body>

<!-- ===== ОБЛОЖКА ===== -->
<section class="cover">

  <img src="1.jpg">

  <!-- ТЕКСТ ПОВЕРХ -->
  <div class="cover-text">

    <h1>VOGUE</h1>

    <p>
      Nastya Edition<br>
      Special Birthday Issue<br>
      From friends with love 💌
    </p>

  </div>

</section>

<!-- ===== ВИДЕО ===== -->
<section class="video-block">

  <video controls>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <video controls>
    <source src="video2.mp4" type="video/mp4">
  </video>

</section>

<!-- ===== НАТАЛЬНАЯ КАРТА ===== -->
<section class="astro">

  <h2>Совместимость</h2>

  <img src="astro.png">

</section>

</body>
</html>
