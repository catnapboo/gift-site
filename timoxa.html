<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Новая страница</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Заданный цвет фона */
            background-color: #e36bbb;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-image {
            width: 100%;
            max-width: 100px; /* Можно настроить под нужный размер */
            height: auto;
            display: block;
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Изображение 31.png в самом верху -->
    <img src="31.png" alt="" class="top-image">

    <div class="content">
        <h1>Страница создана</h1>
    </div>

</body>
</html>
