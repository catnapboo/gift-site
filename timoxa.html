<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Новая страница</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Заданный цвет фона */
            background-color: #e36bbb;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fixed-image {
            /* Размер изображения 31 остается 100px */
            height: 100px;
            width: auto;
            display: block;
        }

        .stack-image {
            /* Изображения 32 и 33 стали чуть больше (70%) */
            width: 70%;
            max-width: 450px;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Изображение 31 с высотой 100px -->
    <img src="31.png" alt="" class="fixed-image">

    <!-- Изображения 32 и 33 друг за другом, немного увеличенные -->
    <img src="32.png" alt="" class="stack-image">
    <img src="33.png" alt="" class="stack-image">

</body>
</html>
