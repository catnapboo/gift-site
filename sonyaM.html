<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nastya Edition</title>

<style>
  .scroll-reveal, .feature { opacity: 0 !important; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400;0,6..96,700;1,6..96,700&family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #d2b48c; 
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* ОБЩИЙ КОНТЕЙНЕР ОБЛОЖКИ */
.magazine-cover {
  position: relative; /* База для позиционирования 7.png */
  width: 100%;
  line-height: 0;
  margin: 0;
  padding: 0;
}

/* ФОНОВАЯ ФОТОГРАФИЯ (4.jpg) */
.main-photo {
  width: 100%;
  height: auto;
  display: block;
}

/* НАКЛАДЫВАЕМОЕ ИЗОБРАЖЕНИЕ (7.png) */
.overlay-image {
  position: absolute;
  left: 0;
  top: 2cm; /* Смещение на 2 см вниз от верхнего края */
  width: 100%; /* Растягиваем по ширине, если нужно. Если 7.png меньше, можно заменить на auto или конкретный % */
  height: auto;
  z-index: 20; /* Поверх фото 4 и выше фишек */
  pointer-events: none; /* Чтобы не мешала кликам, если нужно */
}

/* ФИШКИ НА ОБЛОЖКЕ */
.features-overlay {
  position: absolute;
  top: 45%; /* Немного опустил, чтобы не перекрывалось картинкой 7.png */
  width: 100%;
  z-index: 15;
  padding: 0 20px;
  pointer-events: none;
}

.feature {
  max-width: 180px;
  margin-bottom: 25px; 
  transform: translateY(15px);
  transition: opacity 1s ease, transform 1s ease;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }

.visible { opacity: 1 !important; transform: translateY(0) !important; }

/* АНИМАЦИИ ПРИ СКРОЛЛЕ */
.scroll-reveal {
  transform: translateY(30px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.scroll-reveal.active {
  opacity: 1 !important;
  transform: translateY(0);
}

/* СЕКЦИЯ С ВИДЕО */
.video-background-section {
  width: 100%;
  padding: 80px 20px;
  background-image: url('5.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

video { 
  width: 100%; 
  max-width: 900px;
  border-radius: 4px; 
  box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
}

/* ПАРАЛЛАКС СЕКЦИЯ */
.astro-section-long {
  position: relative;
  width: 100%;
  background-image: url('6.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 120px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.astro-text-container {
  width: 90%;
  max-width: 650px;
  text-align: left;
  background: rgba(210, 180, 140, 0.9); 
  padding: 60px 40px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.05);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

.astro-block { margin-bottom: 70px; }

.astro-block h4 {
  font-family: 'Bodoni Moda', serif;
  font-size: 26px;
  margin-bottom: 25px;
  color: #1a1a1a;
  border-bottom: 1px solid #8b7355;
  display: inline-block;
  padding-bottom: 5px;
}
</style>
</head>
<body>

  <div class="magazine-cover">
    <!-- Основное фото -->
    <img src="4.jpg" class="main-photo" alt="">
    
    <!-- Наложенное фото 7.png -->
    <img src="7.png" class="overlay-image" alt="">

    <div class="features-overlay">
      <div class="feature left" id="f1">
        <h4></h4>
        <p></p>
      </div>
      <div class="feature right" id="f2">
        <h4></h4>
        <p></p>
      </div>
    </div>
  </div>

  <section class="video-background-section">
    <video controls playsinline>
      <source src="1в.mp4" type="video/mp4">
    </video>
  </section>

  <section class="astro-section-long">
    <div class="astro-text-container">
      
      <div class="astro-block scroll-reveal">
        <h4></h4>
        <p></p>
      </div>

      <div class="astro-block scroll-reveal">
        <h4></h4>
        <p></p>
      </div>

      <div class="conclusion-box scroll-reveal">
        <p></p>
      </div>

    </div>
  </section>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => {
      const f1 = document.getElementById('f1');
      const f2 = document.getElementById('f2');
      if(f1) f1.classList.add('visible');
      if(f2) f2.classList.add('visible');
    }, 300);
  });

  const observerOptions = { threshold: 0.15 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('active');
      }
    });
  }, observerOptions);

  document.querySelectorAll('.scroll-reveal').forEach(el => {
    observer.observe(el);
  });
</script>

</body>
</html>
