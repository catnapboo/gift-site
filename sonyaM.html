<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VOGUE: Nastya Edition — Issue 2</title>

<style>
  .scroll-reveal, .feature { opacity: 0 !important; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400;0,6..96,700;1,6..96,700&family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #d2b48c;
  color: #1a1a1a; 
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* ОБЛОЖКА */
.magazine-cover {
  position: relative;
  width: 100%;
  background: #d2b48c;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.main-photo-container {
  width: 100%;
  line-height: 0;
}

.main-photo {
  width: 100%;
  height: auto;
  display: block;
}

.vogue-title {
  position: absolute;
  top: 40px;
  width: 100%;
  font-family: 'Bodoni Moda', serif;
  font-size: 30vw;
  font-weight: 400;
  text-transform: uppercase;
  line-height: 0.8;
  letter-spacing: -2px;
  transform: scaleY(1.4);
  color: white;
  text-align: center;
  z-index: 10;
  pointer-events: none;
}

.edition-info {
  position: absolute;
  top: 15px;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 4px;
  font-size: 10px;
  z-index: 10;
  color: white;
}

.features-overlay {
  position: absolute;
  top: 35%; 
  width: 100%;
  z-index: 15;
  padding: 0 20px;
  pointer-events: none;
}

.feature {
  max-width: 180px;
  margin-bottom: 25px; 
  transform: translateY(15px);
  transition: opacity 1s ease, transform 1s ease;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }

.visible { opacity: 1 !important; transform: translateY(0) !important; }

.scroll-reveal {
  transform: translateY(30px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.scroll-reveal.active {
  opacity: 1 !important;
  transform: translateY(0);
}

/* СЕКЦИЯ С ВИДЕО */
.video-background-section {
  width: 100%;
  padding: 80px 20px;
  background-image: url('5.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

video { 
  width: 100%; 
  max-width: 900px;
  border-radius: 4px; 
  box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
}

/* ПАРАЛЛАКС СЕКЦИЯ */
.astro-section-long {
  position: relative;
  width: 100%;
  background-image: url('6.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 120px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.astro-text-container {
  width: 90%;
  max-width: 650px;
  text-align: left;
  background: rgba(210, 180, 140, 0.9); 
  padding: 60px 40px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.05);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

.astro-block { margin-bottom: 70px; }

.astro-block h4 {
  font-family: 'Bodoni Moda', serif;
  font-size: 26px;
  margin-bottom: 25px;
  color: #1a1a1a;
  border-bottom: 1px solid #8b7355;
  display: inline-block;
  padding-bottom: 5px;
}

.astro-block p {
  font-size: 16px;
  line-height: 1.9;
  color: #2c2c2c;
  margin-bottom: 20px;
  font-weight: 300;
}

.conclusion-box {
  margin-top: 50px;
  padding: 40px 20px;
  border: 1px solid #8b7355;
  text-align: center;
  background: rgba(255,255,255,0.1);
}

.conclusion-box h3 {
  font-family: 'Bodoni Moda', serif;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 20px;
}

footer {
  text-align: center;
  padding: 50px 20px;
  color: #555;
  font-size: 0.8rem;
  background: #d2b48c;
  letter-spacing: 1px;
}
</style>
</head>
<body>

  <div class="magazine-cover">
    <div class="edition-info">Nastya Edition — Issue #2</div>
    <h1 class="vogue-title">VOGUE</h1>
    
    <div class="main-photo-container">
      <img src="4.jpg" class="main-photo" alt="Cover Photo">
    </div>

    <div class="features-overlay">
      <div class="feature left" id="f1">
        <h3></h3>
        <p></p>
      </div>
      <div class="feature right" id="f2">
        <h3></h3>
        <p></p>
      </div>
    </div>
  </div>

  <section class="video-background-section">
    <h2 class="scroll-reveal" style="font-family: 'Bodoni Moda', serif; color: white; letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase;"></h2>
    <video controls playsinline>
      <source src="1в.mp4" type="video/mp4">
    </video>
  </section>

  <section class="astro-section-long">
    <div class="astro-text-container">
      
      <!-- Пустые блоки для будущего контента -->
      <div class="astro-block scroll-reveal">
        <h4></h4>
        <p></p>
      </div>

      <div class="astro-block scroll-reveal">
        <h4></h4>
        <p></p>
      </div>

      <div class="astro-block scroll-reveal">
        <h4></h4>
        <p></p>
      </div>

      <div class="conclusion-box scroll-reveal">
        <h3></h3>
        <p></p>
      </div>

    </div>
  </section>

  <footer>Марс говорит, что ты прекрасна</footer>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('f1').classList.add('visible'), 300);
    setTimeout(() => document.getElementById('f2').classList.add('visible'), 700);
  });

  const observerOptions = { threshold: 0.15 };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('active');
      }
    });
  }, observerOptions);

  document.querySelectorAll('.scroll-reveal').forEach(el => {
    observer.observe(el);
  });
</script>

</body>
</html>
