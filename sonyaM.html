<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nastya Edition</title>

<style>
  .scroll-reveal, .feature, .word { opacity: 0; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Dancing+Script:wght@700&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #d2b48c; 
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

.magazine-cover {
  position: relative;
  width: 100%;
  line-height: 0;
}

.main-photo {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-image {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: auto;
  z-index: 25;
  pointer-events: none;
}

/* ТЕКСТ ПЕСНИ: ЧУТЬ ВЫШЕ */
.symphony-text {
  position: absolute;
  top: 30%; /* Подняли чуть выше */
  width: 100%;
  text-align: center;
  z-index: 30;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(40px, 10vw, 100px);
  color: #ff4d8d;
  line-height: 1.2;
  pointer-events: none;
  
  text-shadow: 
    -3px -3px 0 #e1ad01,  
     3px -3px 0 #e1ad01,
    -3px  3px 0 #e1ad01,
     3px  3px 0 #e1ad01,
     0px  15px 30px rgba(0,0,0,0.3);
}

.word {
  display: inline-block;
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
  margin: 0 8px;
}

.word.show {
  opacity: 1;
  transform: translateY(0);
}

.features-overlay {
  position: absolute;
  top: 60%; 
  width: 100%;
  z-index: 15;
  padding: 0 20px;
}

.feature {
  max-width: 180px;
  margin-bottom: 25px; 
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  transition: opacity 1s ease, transform 1s ease;
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }

.visible { opacity: 1 !important; transform: translateY(0) !important; }

.video-background-section {
  width: 100%;
  padding: 80px 20px;
  background-image: url('5.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
}

video { 
  width: 100%; 
  max-width: 900px;
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

.astro-section-long {
  position: relative;
  width: 100%;
  background-image: url('6.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 120px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.astro-text-container {
  width: 90%;
  max-width: 650px;
  background: rgba(210, 180, 140, 0.9); 
  padding: 60px 40px;
  backdrop-filter: blur(8px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

.scroll-reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.scroll-reveal.active {
  opacity: 1 !important;
  transform: translateY(0);
}
</style>
</head>
<body>

  <div class="magazine-cover">
    <img src="4.jpg" class="main-photo" alt="">
    <img src="7.png" class="overlay-image" alt="">

    <div class="symphony-text" id="symphonyText">
      <span class="word">I</span> <span class="word">just</span> <span class="word">wanna</span> <span class="word">be</span> <span class="word">part</span><br>
      <span class="word">of</span> <span class="word">your</span> <span class="word">symphony</span>
    </div>

    <div class="features-overlay">
      <div class="feature left" id="f1"></div>
      <div class="feature right" id="f2"></div>
    </div>
  </div>

  <section class="video-background-section">
    <video controls playsinline>
      <source src="1в.mp4" type="video/mp4">
    </video>
  </section>

  <section class="astro-section-long">
    <div class="astro-text-container">
      <div class="astro-block scroll-reveal"></div>
      <div class="astro-block scroll-reveal"></div>
    </div>
  </section>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('f1')?.classList.add('visible');
      document.getElementById('f2')?.classList.add('visible');
    }, 400);

    setTimeout(() => {
      const words = document.querySelectorAll('.word');
      words.forEach((word, index) => {
        setTimeout(() => {
          word.classList.add('show');
        }, index * 250); 
      });
    }, 1500);
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('active');
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
