<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nastya Edition</title>

<style>
  .scroll-reveal, .feature, .symphony-text { opacity: 0 !important; }
</style>

<!-- Подключаем мягкий рукописный шрифт Lobster -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Lobster&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #d2b48c; 
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

.magazine-cover {
  position: relative;
  width: 100%;
  line-height: 0;
  margin: 0;
  padding: 0;
}

.main-photo {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-image {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: auto;
  z-index: 25;
  pointer-events: none;
}

/* СТИЛИ ДЛЯ ТЕКСТА ПЕСНИ */
.symphony-text {
  position: absolute;
  top: 15%; /* Расположение под 7.png (настрой под высоту картинки) */
  width: 100%;
  text-align: center;
  z-index: 30;
  font-family: 'Lobster', cursive;
  font-size: clamp(24px, 6vw, 48px);
  color: #ff85a2; /* Мягкий розовый/тропический цвет */
  /* Белая каемочка для читаемости */
  text-shadow: 
    -2px -2px 0 #fff,  
     2px -2px 0 #fff,
    -2px  2px 0 #fff,
     2px  2px 0 #fff,
     0px  4px 10px rgba(0,0,0,0.2);
  transition: opacity 2s ease-in-out, transform 2s ease-out;
  transform: translateY(10px);
  pointer-events: none;
}

.symphony-text.show {
  opacity: 1 !important;
  transform: translateY(0);
}

.features-overlay {
  position: absolute;
  top: 45%; 
  width: 100%;
  z-index: 15;
  padding: 0 20px;
  pointer-events: none;
}

.feature {
  max-width: 180px;
  margin-bottom: 25px; 
  transform: translateY(15px);
  transition: opacity 1s ease, transform 1s ease;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }

.visible { opacity: 1 !important; transform: translateY(0) !important; }

.scroll-reveal {
  transform: translateY(30px);
  transition: opacity 1.2s ease, transform 1.2s ease;
}

.scroll-reveal.active {
  opacity: 1 !important;
  transform: translateY(0);
}

.video-background-section {
  width: 100%;
  padding: 80px 20px;
  background-image: url('5.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

video { 
  width: 100%; 
  max-width: 900px;
  border-radius: 4px; 
  box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
}

.astro-section-long {
  position: relative;
  width: 100%;
  background-image: url('6.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 120px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.astro-text-container {
  width: 90%;
  max-width: 650px;
  text-align: left;
  background: rgba(210, 180, 140, 0.9); 
  padding: 60px 40px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.05);
}
</style>
</head>
<body>

  <div class="magazine-cover">
    <img src="4.jpg" class="main-photo" alt="">
    <img src="7.png" class="overlay-image" alt="">

    <!-- Текст песни -->
    <div class="symphony-text" id="symphonyText">
      I just wanna be part of your symphony
    </div>

    <div class="features-overlay">
      <div class="feature left" id="f1">
        <h4></h4>
        <p></p>
      </div>
      <div class="feature right" id="f2">
        <h4></h4>
        <p></p>
      </div>
    </div>
  </div>

  <section class="video-background-section">
    <video controls playsinline>
      <source src="1в.mp4" type="video/mp4">
    </video>
  </section>

  <section class="astro-section-long">
    <div class="astro-text-container">
      <div class="astro-block scroll-reveal">
        <h4></h4>
        <p></p>
      </div>
      <div class="conclusion-box scroll-reveal">
        <p></p>
      </div>
    </div>
  </section>

<script>
  window.addEventListener('load', () => {
    // Появление фишек через 0.3 сек
    setTimeout(() => {
      document.getElementById('f1')?.classList.add('visible');
      document.getElementById('f2')?.classList.add('visible');
    }, 300);

    // Появление текста песни через 2 секунды (2000 мс)
    setTimeout(() => {
      const symphony = document.getElementById('symphonyText');
      if(symphony) symphony.classList.add('show');
    }, 2000);
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('active');
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
