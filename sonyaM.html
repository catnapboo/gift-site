<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nastya Edition</title>

<style>
  .scroll-reveal, .feature, .symphony-text { opacity: 0 !important; }
</style>

<!-- Используем Dancing Script для мягкого рукописного стиля -->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Dancing+Script:wght@700&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #d2b48c; 
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

.magazine-cover {
  position: relative;
  width: 100%;
  line-height: 0;
  margin: 0;
  padding: 0;
}

.main-photo {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-image {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: auto;
  z-index: 25;
  pointer-events: none;
}

/* ТЕКСТ: ПРЯМОЙ, ВЫШЕ И КРУПНЕЕ */
.symphony-text {
  position: absolute;
  top: 20%; /* Подняли выше */
  width: 100%;
  text-align: center;
  z-index: 30;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(50px, 12vw, 110px); /* Еще крупнее */
  color: #ff4d8d; /* Розовый */
  line-height: 1.0;
  
  /* Горчичная каемка */
  text-shadow: 
    -3px -3px 0 #e1ad01,  
     3px -3px 0 #e1ad01,
    -3px  3px 0 #e1ad01,
     3px  3px 0 #e1ad01,
     0px  15px 30px rgba(0,0,0,0.3);

  /* Прямое положение с легким смещением вниз для анимации */
  transform: translateY(30px); 
  transition: opacity 2s ease-in-out, transform 2s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: none;
  white-space: pre-line;
}

.symphony-text.show {
  opacity: 1 !important;
  transform: translateY(0); /* Плавный подъем на место */
}

.features-overlay {
  position: absolute;
  top: 55%; 
  width: 100%;
  z-index: 15;
  padding: 0 20px;
  pointer-events: none;
}

.feature {
  max-width: 180px;
  margin-bottom: 25px; 
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.visible { opacity: 1 !important; transform: translateY(0) !important; }

/* Видео секция */
.video-background-section {
  width: 100%;
  padding: 60px 20px;
  background-image: url('5.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

video { 
  width: 100%; 
  max-width: 900px;
  border-radius: 12px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

  <div class="magazine-cover">
    <img src="4.jpg" class="main-photo" alt="">
    <img src="7.png" class="overlay-image" alt="">

    <!-- Текст песни: выше, ровно и масштабно -->
    <div class="symphony-text" id="symphonyText">
      I just wanna be
      part of your 
      symphony
    </div>

    <div class="features-overlay">
      <div class="feature left" id="f1">
        <h4></h4>
        <p></p>
      </div>
      <div class="feature right" id="f2">
        <h4></h4>
        <p></p>
      </div>
    </div>
  </div>

  <section class="video-background-section">
    <video controls playsinline>
      <source src="1в.mp4" type="video/mp4">
    </video>
  </section>

<script>
  window.addEventListener('load', () => {
    // Фишки
    setTimeout(() => {
      document.getElementById('f1')?.classList.add('visible');
      document.getElementById('f2')?.classList.add('visible');
    }, 400);

    // Появление текста через 2 секунды
    setTimeout(() => {
      const symphony = document.getElementById('symphonyText');
      if(symphony) symphony.classList.add('show');
    }, 2000);
  });
</script>

</body>
</html>
