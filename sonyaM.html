<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nastya Edition</title>

<style>
  .scroll-reveal, .feature, .word, .extra-img, .row-img-container { opacity: 0; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Dancing+Script:wght@700&family=Montserrat:wght@100;300;400&family=Fascinate&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body, html {
  margin: 0;
  padding: 0;
  width: 100%;
  background: #d2b48c; 
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

.magazine-cover {
  position: relative;
  width: 100%;
  line-height: 0;
  transform: translateZ(0);
  z-index: 20; 
}

.main-photo {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-image {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: auto;
  z-index: 25;
  pointer-events: none;
}

.symphony-text {
  position: absolute;
  top: 30%; 
  width: 100%;
  text-align: center;
  z-index: 30;
  font-family: 'Dancing Script', cursive;
  font-size: clamp(40px, 10vw, 100px);
  color: #ff4d8d;
  line-height: 1.2;
  pointer-events: none;
  text-shadow: -3px -3px 0 #e1ad01, 3px -3px 0 #e1ad01, -3px 3px 0 #e1ad01, 3px 3px 0 #e1ad01, 0px 15px 30px rgba(0,0,0,0.3);
}

.word {
  display: inline-block;
  opacity: 0;
  transform: translateY(15px);
  transition: opacity 0.5s ease-out, transform 0.5s ease-out;
  margin: 0 8px;
  will-change: transform, opacity;
}

.word.show { opacity: 1; transform: translateY(0); }

.extra-img {
  position: absolute;
  height: auto;
  z-index: 28;
  transition: opacity 1.8s ease-out, transform 1.8s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
  will-change: transform, opacity;
}

.img-8 { left: 0; top: 48%; width: 38%; transform: translate(-100%, 50px) rotate(-20deg); }
.img-9 { right: 0; top: 55%; width: 38%; transform: translate(100%, 50px) rotate(20deg); }
.extra-img.visible { opacity: 1; transform: translate(0, 0) rotate(0deg); }

.row-img-container {
  position: absolute;
  top: 78%; 
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 0 2%;
  z-index: 99999; 
  transition: opacity 1.5s ease-in-out;
  pointer-events: none;
}

.row-item {
  height: auto;
  will-change: transform;
  pointer-events: auto;
  transform: translate3d(0,0,0);
}

.row-item:nth-child(1) { width: 32%; }
.row-item:nth-child(2) { width: 40%; }
.row-item:nth-child(3) { width: 40%; margin-left: -5%; } 

.features-overlay {
  position: absolute;
  top: 92%; 
  width: 100%;
  z-index: 15;
  padding: 0 20px;
}

.feature {
  max-width: 180px;
  margin-bottom: 25px; 
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  transition: opacity 1s ease, transform 1s ease;
  will-change: transform, opacity;
}

.feature.left { text-align: left; border-left: 1px solid white; padding-left: 15px; margin-right: auto; }
.feature.right { text-align: right; border-right: 1px solid white; padding-right: 15px; margin-left: auto; }
.visible { opacity: 1 !important; transform: translateY(0) !important; }

.video-background-section {
  width: 100%;
  padding: 80px 20px 0 20px; /* Убран нижний отступ */
  background-image: url('5.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 10; 
}

.video-container {
  width: 100%;
  max-width: 900px;
  aspect-ratio: 16 / 9;
  display: flex;
  justify-content: center;
}

video { 
  width: 100%; 
  height: 100%;
  border-radius: 8px; 
  box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
  background: transparent;
  transform: translateZ(0);
}

/* ИСПРАВЛЕННЫЙ КОНТЕЙНЕР РЫБ (БЕЗ ПРОПУСКОВ) */
.fish-tank-overlay {
  position: relative;
  width: 100%;
  height: 140px; /* Уменьшена высота, чтобы рыбы не обрезались и не создавали дыру */
  margin: 0; /* Убраны маргины, чтобы состыковать фоны */
  pointer-events: none;
  z-index: 999999; 
  overflow: hidden;
  background: transparent;
}

.fish-img {
  position: absolute;
  width: 200px; 
  height: auto;
  opacity: 0; 
  will-change: transform, left, top;
}

.astro-section-long {
  position: relative;
  width: 100%;
  background-image: url('6.jpg');
  background-repeat: repeat; 
  background-size: 100% auto;
  padding: 0 0 100px 0; /* Убран верхний отступ для стыковки */
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 1; 
}

.astro-title {
  font-family: 'Fascinate', cursive
