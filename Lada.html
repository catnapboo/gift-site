<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sotvorenie Animation v3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #5773aa;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Изображения 20 и 21 (Сотворение Адама) */
        .hand-img {
            position: absolute;
            width: 90%; 
            max-width: 500px;
            height: auto;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s ease-out;
        }

        /* Левая рука (20): снизу-слева в центр */
        #img20 {
            right: 50%; /* Пальцы упираются в центр */
            transform: translate(-50%, 30%) scale(0.8);
            transform-origin: right center;
        }

        /* Правая рука (21): сверху-справа в центр */
        #img21 {
            left: 50%; /* Пальцы упираются в центр */
            transform: translate(50%, -30%) scale(0.8);
            transform-origin: left center;
        }

        .active-sides {
            opacity: 1 !important;
            transform: translate(0, 0) scale(1) !important;
        }

        /* Изображение 19 (как в предыдущем коде) */
        #img19 {
            position: absolute;
            left: 0;
            width: 100%; /* Касается краев по бокам */
            top: 200px;  /* Опущено ниже от верхнего края */
            height: auto;
            opacity: 0;
            z-index: 5;
            will-change: opacity;
            transition: opacity 3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Руки соприкасаются здесь -->
        <img src="20.png" id="img20" class="hand-img">
        <img src="21.png" id="img21" class="hand-img">
        
        <!-- Фоновое изображение 19 -->
        <img src="19.png" id="img19">
    </div>

    <script>
        window.addEventListener('load', () => {
            const img19 = document.getElementById('img19');
            const img20 = document.getElementById('img20');
            const img21 = document.getElementById('img21');

            // 1. Запуск движения рук (20 и 21)
            setTimeout(() => {
                img20.classList.add('active-sides');
                img21.classList.add('active-sides');

                // 2. После соприкосновения (через 3 сек) плавно проявляем 19.png
                setTimeout(() => {
                    img19.style.opacity = "1";
                }, 3000); 
            }, 500);
        });
    </script>
</body>
</html>
