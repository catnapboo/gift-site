<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Журнал</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #5773aa;
      min-height: 100vh;
    }

    .top {
      position: relative;
    }

    /* 19.png — базовый слой, опущен ниже */
    .img-base {
      display: block;
      width: 100%;
      margin-top: 80px;
      opacity: 0;
      animation: gentleFade 2.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      animation-delay: 1.2s;
    }

    /* Контейнер для 20 и 21 поверх */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    /* 20.png — слева, чуть раньше и чуть медленнее */
    .fly-left {
      width: 55%;
      opacity: 0;
      animation: flyLeft 1.8s cubic-bezier(0.16, 0.8, 0.4, 1) forwards;
      animation-delay: 0.1s;
    }

    /* 21.png — справа, едва позже и чуть быстрее */
    .fly-right {
      width: 55%;
      opacity: 0;
      animation: flyRight 1.55s cubic-bezier(0.2, 0.75, 0.4, 1) forwards;
      animation-delay: 0.28s;
    }

    .fly-left img,
    .fly-right img {
      display: block;
      width: 100%;
    }

    @keyframes flyLeft {
      from {
        opacity: 0;
        transform: translateX(-90px);
      }
      60% {
        opacity: 1;
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes flyRight {
      from {
        opacity: 0;
        transform: translateX(90px);
      }
      60% {
        opacity: 1;
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes gentleFade {
      0%   { opacity: 0; transform: translateY(10px); }
      40%  { opacity: 0.15; }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="top">
    <img class="img-base" src="19.png" alt="" />

    <div class="overlay">
      <div class="fly-left">
        <img src="20.png" alt="" />
      </div>
      <div class="fly-right">
        <img src="21.png" alt="" />
      </div>
    </div>
  </div>

</body>
</html>
