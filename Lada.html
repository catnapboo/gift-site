<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Stage v2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #5773aa;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* Изображения 20 и 21 (уменьшены в 2 раза относительно прошлого варианта) */
        .side-img {
            position: absolute;
            top: 0;
            width: 150%; 
            height: auto;
            opacity: 0;
            z-index: 10;
            transition: transform 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 2s ease-out;
            pointer-events: none;
        }

        /* 20: снизу-слева в центр */
        #img20 {
            left: 0;
            transform: translate(-40%, 40%);
        }

        /* 21: сверху-справа в центр */
        #img21 {
            right: 0;
            transform: translate(40%, -40%);
        }

        .active-sides {
            opacity: 1 !important;
            transform: translate(0, 0) !important;
        }

        /* Изображение 19 (сделано больше и опущено) */
        #img19 {
            position: absolute;
            left: 0;
            width: 100%;
            top: 250px; /* Опущено чуть ниже */
            transform: scale(1.2); /* Увеличено */
            height: auto;
            opacity: 0;
            z-index: 5;
            transition: opacity 3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="20.png" id="img20" class="side-img">
        <img src="21.png" id="img21" class="side-img">
        <img src="19.png" id="img19">
    </div>

    <script>
        window.addEventListener('load', () => {
            const img19 = document.getElementById('img19');
            const img20 = document.getElementById('img20');
            const img21 = document.getElementById('img21');

            // 1. Запуск движения 20 и 21
            setTimeout(() => {
                img20.classList.add('active-sides');
                img21.classList.add('active-sides');

                // 2. Появление 19 после завершения движения боковых
                setTimeout(() => {
                    img19.style.opacity = "1";
                }, 2500); 
            }, 500);
        });
    </script>
</body>
</html>
