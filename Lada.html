<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Birth of Venus Intro v10</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #5773aa;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
        }

        /* --- Стили для Интро --- */
        #intro-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1.5s ease-in-out;
            background-color: #5773aa;
        }

        /* Изображение 22.png */
        #img22 {
            position: absolute;
            top: 40px;
            width: 40%; 
            max-width: 200px; 
            height: auto;
            z-index: 2001;
            /* Изменение: Изначально скрыто для плавного появления */
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Класс для показа изображения */
        #img22.visible {
            opacity: 1;
        }

        /* Стили для текста */
        .story-text {
            font-family: 'Great Vibes', cursive;
            font-size: 26px; 
            color: #F5EDD1; 
            text-align: center;
            line-height: 1.2; 
            max-width: 85%;
            margin-top: 60px;
        }

        /* Стиль для плавного появления слова */
        .word-fade {
            opacity: 0;
            display: inline-block;
            transition: opacity 0.8s ease-in-out; /* Изменение: Чуть быстрее проявление */
            margin-right: 6px;
        }

        .word-fade.visible {
            opacity: 1;
        }

        .intro-hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* --- Стили для основной анимации (без изменений) --- */
        #main-stage {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .main-visible {
            opacity: 1 !important;
        }

        .hand-img {
            position: absolute;
            height: auto;
            opacity: 0;
            z-index: 11;
            margin-top: -140px; 
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s ease-out;
        }

        #img20 {
            right: 48%; 
            width: 56.7%; 
            max-width: 283.5px; 
            transform: translate(-40%, 20%) scale(0.9);
            transform-origin: right center;
        }

        #img21 {
            left: 48%; 
            width: 72%; 
            max-width: 360px; 
            transform: translate(40%, -20%) scale(0.9);
            transform-origin: left center;
        }

        .active-sides {
            opacity: 1 !important;
            transform: translate(0, 0) scale(1) !important;
        }

        #img19 {
            position: absolute;
            left: 0;
            width: 100%; 
            top: 130px; 
            height: auto;
            opacity: 0;
            z-index: 5;
            will-change: opacity;
            transition: opacity 2s ease-in-out; 
        }
    </style>
</head>
<body id="body-trigger">

    <div id="intro-stage">
        <!-- Ссылка на файл для предварительного просмотра -->
        <img src="22.png" id="img22" alt="Venus Logo">
        <div id="typewriter-text" class="story-text"></div>
    </div>

    <div id="main-stage">
        <img src="20.png" id="img20" class="hand-img" alt="Adam Hand Left">
        <img src="21.png" id="img21" class="hand-img" alt="God Hand Right">
        <img src="19.png" id="img19" alt="Background Element">
    </div>

    <script>
        const textToType = "Когда титан оскопил своего отца, его кровь пролилась в море и смешалась с солёной водой. Волны вспенились, поднялась белоснежная пена, и из этой морской пены явилась миру прекрасная девушка";
        const typewriterElement = document.getElementById('typewriter-text');
        const introStage = document.getElementById('intro-stage');
        const mainStage = document.getElementById('main-stage');
        const bodyTrigger = document.getElementById('body-trigger');
        const img22 = document.getElementById('img22');

        const img19 = document.getElementById('img19');
        const img20 = document.getElementById('img20');
        const img21 = document.getElementById('img21');

        let textIsFinished = false;

        // Функция плавного появления по словам
        function fadeWords(text, element, speed) {
            const words = text.split(' ');
            
            words.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word-fade';
                element.appendChild(span);
                element.appendChild(document.createTextNode(' '));
            });

            const spans = element.querySelectorAll('.word-fade');
            let index = 0;

            function showNext() {
                if (index < spans.length) {
                    spans[index].classList.add('visible');
                    index++;
                    setTimeout(showNext, speed);
                } else {
                    textIsFinished = true;
                }
            }
            showNext();
        }

        // --- Изменения в тайминге появления ---
        window.addEventListener('load', () => {
            // 1. Небольшая задержка перед всем интро (1 секунда)
            setTimeout(() => {
                // А. Плавно показываем изображение 22
                img22.classList.add('visible');

                // Б. Начинаем плавное появление текста (чуть быстрее: 180мс на слово вместо 250мс)
                // fadeWords(текст, элемент, скорость проявления следующего слова в мс)
                fadeWords(textToType, typewriterElement, 180); 
            }, 1000); // Общая начальная задержка
        });

        // Обработка Тапа по экрану (без изменений)
        bodyTrigger.addEventListener('click', () => {
            if (textIsFinished) {
                introStage.classList.add('intro-hidden');

                setTimeout(() => {
                    mainStage.classList.add('main-visible');

                    setTimeout(() => {
                        img20.classList.add('active-sides');
                        img21.classList.add('active-sides');

                        setTimeout(() => {
                            img19.style.opacity = "1";
                        }, 2800); 
                    }, 500);
                }, 1500); 
            }
        });
    </script>
</body>
</html>
