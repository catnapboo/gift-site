<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Birth of Venus Intro v27</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400&family=Amarante&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #5773aa;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
        }

        /* --- ЭТАП 1: ИНТРО --- */
        #intro-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1.5s ease-in-out;
            background-color: #5773aa;
        }

        #img23 {
            position: absolute;
            top: 40px;
            width: 30%; 
            max-width: 160px; 
            height: auto;
            z-index: 2001;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #img23.visible { opacity: 1; }

        .story-text {
            font-family: 'Great Vibes', cursive;
            font-size: 26px; 
            color: #F5EDD1; 
            text-align: center;
            line-height: 1.2; 
            max-width: 85%;
            margin-top: 60px;
        }

        .word-fade {
            opacity: 0;
            display: inline-block;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-right: 6px;
            will-change: opacity;
        }

        .word-fade.visible { opacity: 1 !important; }

        .intro-hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* --- ЭТАП 2: ОСНОВНАЯ СЦЕНА --- */
        #main-stage {
            position: relative;
            width: 100%;
            height: auto; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .main-visible { opacity: 1 !important; }

        #img22 {
            position: absolute;
            top: 40px;
            width: 40%; 
            max-width: 200px; 
            height: auto;
            z-index: 15;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        /* --- АНИМАЦИЯ ПО ДУГЕ --- */
        .side-24 {
            position: absolute;
            top: 0;
            width: 45%;
            max-width: 300px;
            height: auto;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .side-25 {
            position: absolute;
            top: 250px; 
            width: 45%;
            max-width: 300px;
            height: auto;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes arcInTopLeft {
            0% { opacity: 0; transform: translate(-100%, -100%) rotate(-20deg) scaleX(-1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(-1); }
        }
        @keyframes arcInTopRight {
            0% { opacity: 0; transform: translate(100%, -100%) rotate(20deg) scaleX(1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(1); }
        }
        @keyframes arcInBottomLeft {
            0% { opacity: 0; transform: translate(-100%, 100%) rotate(20deg) scaleX(-1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(-1); }
        }
        @keyframes arcInBottomRight {
            0% { opacity: 0; transform: translate(100%, 100%) rotate(-20deg) scaleX(1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(1); }
        }

        .animate-24-l { animation: arcInTopLeft 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-24-r { animation: arcInTopRight 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-25-l { animation: arcInBottomLeft 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-25-r { animation: arcInBottomRight 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        /* --- ОСТАЛЬНЫЕ ЭЛЕМЕНТЫ --- */
        .hand-img {
            position: absolute;
            height: auto;
            opacity: 0;
            z-index: 11;
            top: 50vh; 
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s ease-out;
        }

        #img20 {
            right: 48%; 
            width: 56.7%; 
            max-width: 283.5px; 
            margin-top: -140px; 
            transform: translate(-40%, 20%) scale(0.9);
            transform-origin: right center;
        }

        #img21 {
            left: 48%; 
            width: 72%; 
            max-width: 360px; 
            margin-top: -180px; 
            transform: translate(40%, -20%) scale(0.9);
            transform-origin: left center;
        }

        .active-sides {
            opacity: 1 !important;
            transform: translate(0, 0) scale(1) !important;
        }

        #img19 {
            position: absolute;
            left: 0;
            width: 100%; 
            top: 130px; 
            height: auto;
            opacity: 0;
            z-index: 5;
            will-change: opacity;
            transition: opacity 2s ease-in-out; 
        }

        #img26 {
            position: absolute;
            left: 0;
            width: 100%; 
            top: 760px; 
            height: auto;
            opacity: 1; 
            z-index: 4;
        }

        #natal-label {
            position: absolute;
            left: 0;
            width: 100%;
            top: 1100px; /* Оставляем на том же месте */
            text-align: center;
            font-family: 'Amarante', serif;
            font-size: 32px;
            color: #403a38;
            opacity: 0;
            z-index: 12;
            transition: opacity 2s ease-in-out;
            pointer-events: none;
        }

        #natal-container {
            position: absolute;
            top: 900px; /* Поднимаем весь прямоугольник выше */
            left: 0;
            width: 100%;
            min-height: 500px;
            padding-bottom: 50px;
            background-image: url('27.jpg');
            background-repeat: repeat-y;
            background-size: 100% auto;
            background-position: center -400px; /* Поднимаем фон 27 еще выше внутри */
            z-index: 3;
            opacity: 1; 
        }

            width: 85%;
            padding: 30px;

            border-radius: 10px;
