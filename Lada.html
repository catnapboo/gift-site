<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Birth of Venus Intro v20</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #5773aa;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
        }

        /* --- ЭТАП 1: ИНТРО --- */
        #intro-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1.5s ease-in-out;
            background-color: #5773aa;
        }

        #img23 {
            position: absolute;
            top: 40px;
            width: 30%; 
            max-width: 160px; 
            height: auto;
            z-index: 2001;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #img23.visible { opacity: 1; }

        .story-text {
            font-family: 'Great Vibes', cursive;
            font-size: 26px; 
            color: #F5EDD1; 
            text-align: center;
            line-height: 1.2; 
            max-width: 85%;
            margin-top: 60px;
        }

        .word-fade {
            opacity: 0;
            display: inline-block;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-right: 6px;
            will-change: opacity;
        }

        .word-fade.visible { opacity: 1; }

        .intro-hidden {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* --- ЭТАП 2: ОСНОВНАЯ СЦЕНА --- */
        #main-stage {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .main-visible { opacity: 1 !important; }

        #img22 {
            position: absolute;
            top: 40px;
            width: 40%; 
            max-width: 200px; 
            height: auto;
            z-index: 15;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        /* --- АНИМАЦИЯ ПО ДУГЕ --- */
        
        /* 24: Вылет сверху по дуге */
        .side-24 {
            position: absolute;
            top: 0;
            width: 45%;
            max-width: 300px;
            height: auto;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        /* 25: Вылет снизу по дуге и позиция ниже */
        .side-25 {
            position: absolute;
            top: 250px; /* Опустили ниже (было 100px) */
            width: 45%;
            max-width: 300px;
            height: auto;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        /* Анимация для 24-лево (сверху-слева дугой) */
        @keyframes arcInTopLeft {
            0% { opacity: 0; transform: translate(-100%, -100%) rotate(-20deg) scaleX(-1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(-1); }
        }
        /* Анимация для 24-право (сверху-справа дугой) */
        @keyframes arcInTopRight {
            0% { opacity: 0; transform: translate(100%, -100%) rotate(20deg) scaleX(1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(1); }
        }
        /* Анимация для 25-лево (снизу-слева дугой) */
        @keyframes arcInBottomLeft {
            0% { opacity: 0; transform: translate(-100%, 100%) rotate(20deg) scaleX(-1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(-1); }
        }
        /* Анимация для 25-право (снизу-справа дугой) */
        @keyframes arcInBottomRight {
            0% { opacity: 0; transform: translate(100%, 100%) rotate(-20deg) scaleX(1); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0deg) scaleX(1); }
        }

        /* Классы для запуска анимации */
        .animate-24-l { animation: arcInTopLeft 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-24-r { animation: arcInTopRight 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-25-l { animation: arcInBottomLeft 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-25-r { animation: arcInBottomRight 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

        /* --- ОСТАЛЬНЫЕ ЭЛЕМЕНТЫ --- */
        .hand-img {
            position: absolute;
            height: auto;
            opacity: 0;
            z-index: 11;
            margin-top: -140px; 
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s ease-out;
        }

        #img20 {
            right: 48%; 
            width: 56.7%; 
            max-width: 283.5px; 
            transform: translate(-40%, 20%) scale(0.9);
            transform-origin: right center;
        }

        #img21 {
            left: 48%; 
            width: 72%; 
            max-width: 360px; 
            transform: translate(40%, -20%) scale(0.9);
            transform-origin: left center;
        }

        .active-sides {
            opacity: 1 !important;
            transform: translate(0, 0) scale(1) !important;
        }

        #img19 {
            position: absolute;
            left: 0;
            width: 100%; 
            top: 130px; 
            height: auto;
            opacity: 0;
            z-index: 5;
            will-change: opacity;
            transition: opacity 2s ease-in-out; 
        }

        .fade-in { opacity: 1 !important; }

    </style>
</head>
<body id="body-trigger">

    <div id="intro-stage">
        <img src="23.png" id="img23">
        <div id="typewriter-text" class="story-text"></div>
    </div>

    <div id="main-stage">
        <img src="22.png" id="img22">
        
        <img src="24.png" id="img24-left" class="side-24" style="left:0;">
        <img src="24.png" id="img24-right" class="side-24" style="right:0;">
        
        <img src="25.png" id="img25-left" class="side-25" style="left:0;">
        <img src="25.png" id="img25-right" class="side-25" style="right:0;">

        <img src="20.png" id="img20" class="hand-img">
        <img src="21.png" id="img21" class="hand-img">
        <img src="19.png" id="img19">
    </div>

    <script>
        const textToType = "Когда титан оскопил своего отца, его кровь пролилась в море и смешалась с солёной водой. Волны вспенились, поднялась белоснежная пена, и из этой морской пены явилась миру прекрасная девушка";
        const typewriterElement = document.getElementById('typewriter-text');
        const introStage = document.getElementById('intro-stage');
        const mainStage = document.getElementById('main-stage');
        const bodyTrigger = document.getElementById('body-trigger');
        
        const img23 = document.getElementById('img23');
        const img22 = document.getElementById('img22');
        
        const i24l = document.getElementById('img24-left');
        const i24r = document.getElementById('img24-right');
        const i25l = document.getElementById('img25-left');
        const i25r = document.getElementById('img25-right');

        const img19 = document.getElementById('img19');
        const img20 = document.getElementById('img20');
        const img21 = document.getElementById('img21');

        let textIsFinished = false;

        function fadeWords(text, element, speed) {
            const words = text.split(' ');
            words.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word-fade';
                element.appendChild(span);
                element.appendChild(document.createTextNode(' '));
            });
            const spans = element.querySelectorAll('.word-fade');
            let index = 0;
            function showNext() {
                if (index < spans.length) {
                    spans[index].classList.add('visible');
                    index++;
                    setTimeout(showNext, speed);
                } else { textIsFinished = true; }
            }
            showNext();
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                img23.classList.add('visible');
                setTimeout(() => {
                    fadeWords(textToType, typewriterElement, 180); 
                }, 1100); 
            }, 1000); 
        });

        bodyTrigger.addEventListener('click', () => {
            if (textIsFinished) {
                introStage.classList.add('intro-hidden');

                setTimeout(() => {
                    mainStage.classList.add('main-visible');
                    
                    setTimeout(() => {
                        // 1. Появление 22
                        img22.classList.add('fade-in');

                        setTimeout(() => {
                            // 2. Вылет 24 по дуге сверху
                            i24l.classList.add('animate-24-l');
                            i24r.classList.add('animate-24-r');

                            setTimeout(() => {
                                // 3. Вылет 25 по дуге снизу
                                i25l.classList.add('animate-25-l');
                                i25r.classList.add('animate-25-r');

                                setTimeout(() => {
                                    // 4. Появление рук и фона
                                    img20.classList.add('active-sides');
                                    img21.classList.add('active-sides');
                                    setTimeout(() => {
                                        img19.style.opacity = "1";
                                    }, 2800); 
                                }, 1500);

                            }, 1500);
                        }, 1500);
                    }, 500);
                }, 1500); 
            }
        });
    </script>
</body>
</html>
