<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sotvorenie Animation v4</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #5773aa;
            overflow-x: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Изображения 20 и 21 (Сотворение Адама) — Сделаны КРУПНЕЕ */
        .hand-img {
            position: absolute;
            width: 120%; /* Увеличено со 100% */
            max-width: 700px; /* Увеличен лимит для десктопа */
            height: auto;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            will-change: transform, opacity;
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1), opacity 2s ease-out;
        }

        /* Левая рука (20) — Финальное положение ближе к центру */
        #img20 {
            right: 48%; /* Сдвинуто ближе к центру (было 50%) */
            transform: translate(-40%, 20%) scale(0.9);
            transform-origin: right center;
        }

        /* Правая рука (21) — Финальное положение ближе к центру */
        #img21 {
            left: 48%; /* Сдвинуто ближе к центру (было 50%) */
            transform: translate(40%, -20%) scale(0.9);
            transform-origin: left center;
        }

        .active-sides {
            opacity: 1 !important;
            transform: translate(0, 0) scale(1) !important;
        }

        /* Изображение 19 — Сделано ВЫШЕ */
        #img19 {
            position: absolute;
            left: 0;
            width: 100%; 
            top: 80px;  /* Было 200px — теперь значительно выше */
            height: auto;
            opacity: 0;
            z-index: 5;
            will-change: opacity;
            transition: opacity 3s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="20.png" id="img20" class="hand-img">
        <img src="21.png" id="img21" class="hand-img">
        <img src="19.png" id="img19">
    </div>

    <script>
        window.addEventListener('load', () => {
            const img19 = document.getElementById('img19');
            const img20 = document.getElementById('img20');
            const img21 = document.getElementById('img21');

            setTimeout(() => {
                img20.classList.add('active-sides');
                img21.classList.add('active-sides');

                setTimeout(() => {
                    img19.style.opacity = "1";
                }, 3000); 
            }, 500);
        });
    </script>
</body>
</html>
