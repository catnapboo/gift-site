<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background-color: #b9dcfa;
      overflow-x: hidden;
    }

    /* 34 — фон первого экрана */
    .bg-section {
      width: 100%;
      min-height: 100vh;
      background-image: url('34.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      position: relative;
    }

    /* 35 — поверх 34, в самом верху */
    .section-35 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      opacity: 0;
    }
    .section-35 img {
      width: 100%;
      display: block;
    }

    /* 40 — поверх 34, увеличенное, зеркальное, у левого края */
    .section-40 {
      position: absolute;
      top: 45%;
      left: 0;
      transform: scaleX(-1);
      transform-origin: left center;
      width: 55%;
      opacity: 0;
    }
    .section-40 img {
      display: block;
      width: 100%;
    }

    /* 36 — поверх всего, чуть выше 39 */
    .section-36 {
      position: relative;
      width: 100%;
      opacity: 0;
      z-index: 10;
    }
    .section-36 img {
      width: 100%;
      display: block;
    }

    /* 39 */
    .section-39 img {
      width: 100%;
      display: block;
      opacity: 0;
    }

    /* Плавное появление */
    #bg34.fade-in {
      animation: fadeIn 0.5s ease-in forwards;
    }

    .fade-in {
      animation: fadeIn 1.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Летящее 38 */
    .flying-image {
      position: fixed;
      top: 0;
      left: -25vw;
      width: 150vw;
      height: 150vw;
      object-fit: cover;
      display: block;
      animation: flyDown 3s ease-in-out forwards;
    }

    @keyframes flyDown {
      0% {
        transform: translateX(0) translateY(-100%);
        opacity: 1;
      }
      70% {
        opacity: 1;
      }
      100% {
        transform: translateX(0) translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="bg-section" id="bg34">
    <div class="section-35" id="section35">
      <img src="35.png" alt="image 35" />
    </div>
    <div class="section-40" id="section40">
      <img src="40.png" alt="image 40" />
    </div>
  </div>

  <div class="section-36" id="section36">
    <img src="36.png" alt="image 36" />
  </div>

  <div class="section-39" id="section39">
    <img src="39.jpg" alt="image 39" />
  </div>

  <img class="flying-image" src="38.png" alt="flying image" />

  <script>
    setTimeout(() => {
      // 34 и 35 появляются одновременно
      document.getElementById('bg34').classList.add('fade-in');
      document.getElementById('section35').classList.add('fade-in');

      // +1.5с — появляется 40 поверх 34
      setTimeout(() => {
        document.getElementById('section40').classList.add('fade-in');
      }, 1500);

      // +1.5с — появляется 39 и 36
      setTimeout(() => {
        document.querySelector('#section39 img').classList.add('fade-in');
        document.getElementById('section36').classList.add('fade-in');
      }, 1500);

    }, 3000);
  </script>

</body>
</html>
