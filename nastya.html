<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden;
        }

        /* Фоновое изображение 34.jpg */
        .background-final {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('34.jpg') no-repeat center top;
            background-size: cover;
            opacity: 0;
            /* Плавное появление за 1 секунду после завершения падения (через 3с) */
            animation: fadeIn 1s ease-in forwards;
            animation-delay: 3s;
            z-index: 1;
        }

        /* Падающее изображение 38.png */
        .snowflake {
            position: absolute;
            width: 800px;
            height: auto;
            left: 50%;
            transform: translateX(-50%);
            top: -900px; /* Начальная точка за верхним краем */
            z-index: 2;
            /* Простое вертикальное падение за 3 секунды */
            animation: fallDown 3s linear forwards;
        }

        @keyframes fallDown {
            0% {
                top: -900px;
            }
            100% {
                top: 110vh; /* Конечная точка за нижним краем */
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="background-final"></div>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
