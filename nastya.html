<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            left: 50%;
            top: 0;
            /* Совмещаем основное падение и покачивание */
            animation: 
                fall-down 3s linear forwards,
                sway 0.8s ease-in-out infinite alternate;
        }

        /* Анимация движения вниз */
        @keyframes fall-down {
            0% {
                top: -800px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                top: 110vh;
                opacity: 0;
            }
        }

        /* Анимация покачивания влево-вправо */
        @keyframes sway {
            0% {
                margin-left: -50px;
                transform: translateX(-50%) rotate(-5deg);
            }
            100% {
                margin-left: 50px;
                transform: translateX(-50%) rotate(5deg);
            }
        }
    </style>
</head>
<body>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
