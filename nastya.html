<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background-color: #b9dcfa;
      overflow-x: hidden;
    }

    .bg-section {
      width: 100%;
      min-height: 100vh;
      background-image: url('34.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      position: relative;
    }

    .section-35 {
      position: absolute;
      top: 0;
      left: -10%;
      width: 120%;
      height: 250px;
      background-image: url('35.png');
      background-repeat: repeat-x;
      background-size: contain;
      opacity: 0;
    }

    /* Контейнер для 40 и 41 */
    .wrapper-assets {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column; /* Располагаем 40 и 41 друг под другом */
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .row {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .asset-img {
      width: 75%;
      opacity: 0;
    }

    /* Специфика для 40 (зеркальность) */
    .asset-40.left { transform: scaleX(-1) translateX(20%); }
    .asset-40.right { transform: translateX(20%); }

    /* Специфика для 41 (без зеркальности, просто сдвиг за край) */
    .asset-41.left { transform: translateX(-20%); }
    .asset-41.right { transform: translateX(20%); }

    .asset-img img {
      display: block;
      width: 100%;
    }

    /* 36 теперь значительно выше */
    .section-36 {
      position: relative;
      width: 100%;
      margin-top: -350px; /* Отрицательный отступ поднимает блок вверх */
      opacity: 0;
      z-index: 10;
    }
    .section-36 img {
      width: 100%;
      display: block;
    }

    .section-39 img {
      width: 100%;
      display: block;
      opacity: 0;
    }

    #bg34.fade-in {
      animation: fadeIn 0.5s ease-in forwards;
    }

    .fade-in {
      animation: fadeIn 1.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .flying-image {
      position: fixed;
      top: 0;
      left: -25vw;
      width: 150vw;
      height: 150vw;
      object-fit: cover;
      display: block;
      animation: flyDown 3s ease-in-out forwards;
    }

    @keyframes flyDown {
      0% {
        transform: translateX(0) translateY(-100%);
        opacity: 1;
      }
      70% {
        opacity: 1;
      }
      100% {
        transform: translateX(0) translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="bg-section" id="bg34">
    <div class="section-35" id="section35"></div>
    
    <div class="wrapper-assets">
      <!-- Ряд с 40 -->
      <div class="row">
        <div class="asset-img asset-40 left" id="asset40-left">
          <img src="40.png" alt="image 40" />
        </div>
        <div class="asset-img asset-40 right" id="asset40-right">
          <img src="40.png" alt="image 40" />
        </div>
      </div>
      <!-- Ряд с 41 (ниже 40) -->
      <div class="row">
        <div class="asset-img asset-41 left" id="asset41-left">
          <img src="41.png" alt="image 41" />
        </div>
        <div class="asset-img asset-41 right" id="asset41-right">
          <img src="41.png" alt="image 41" />
        </div>
      </div>
    </div>
  </div>

  <div class="section-36" id="section36">
    <img src="36.png" alt="image 36" />
  </div>

  <div class="section-39" id="section39">
    <img src="39.jpg" alt="image 39" />
  </div>

  <img class="flying-image" src="38.png" alt="flying image" />

  <script>
    setTimeout(() => {
      document.getElementById('bg34').classList.add('fade-in');
      document.getElementById('section35').classList.add('fade-in');

      setTimeout(() => {
        // Появление 40 и 41 одновременно
        document.getElementById('asset40-left').classList.add('fade-in');
        document.getElementById('asset40-right').classList.add('fade-in');
        document.getElementById('asset41-left').classList.add('fade-in');
        document.getElementById('asset41-right').classList.add('fade-in');
        
        setTimeout(() => {
          document.querySelector('#section39 img').classList.add('fade-in');
          document.getElementById('section36').classList.add('fade-in');
        }, 1500);
        
      }, 1500);

    }, 3000);
  </script>

</body>
</html>
