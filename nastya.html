<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            /* Центрируем по горизонтали и прячем за верхний край */
            left: 50%;
            top: 0;
            transform: translate(-50%, -100%);
            /* Скорость увеличена: время полета теперь 3 секунды */
            animation: fall-down 3s linear forwards;
        }

        @keyframes fall-down {
            0% {
                transform: translate(-50%, -100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                /* Уходит вниз за пределы экрана */
                transform: translate(-50%, 110vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
