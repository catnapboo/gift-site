<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #b9dcfa;
      overflow-x: hidden;
    }

    .flying-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: auto;
      display: block;
      animation: flyDown 3s ease-in-out forwards;
    }

    @keyframes flyDown {
      from {
        transform: translateY(-100%);
      }
      to {
        transform: translateY(calc(100vh - 100%));
      }
    }
  </style>
</head>
<body>

  <img class="flying-image" src="38.png" alt="flying image" />

</body>
</html>
