<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .background-final {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('34.jpg') no-repeat center top;
            background-size: cover;
            opacity: 0;
            /* Появляется ровно через 3 секунды, когда 38 исчезнет */
            animation: fade-in-bg 1s ease-in forwards;
            animation-delay: 3s;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            left: 50%;
            /* Фиксируем центр по X, чтобы не дергалось */
            transform: translateX(-50%);
            z-index: 2;
            /* Прямое падение: от -100% высоты до 110% высоты экрана */
            animation: simple-fall 3s linear forwards;
        }

        @keyframes fade-in-bg {
            to { opacity: 1; }
        }

        @keyframes simple-fall {
            0% {
                top: -900px; /* Начало за экраном */
                opacity: 1;
            }
            95% {
                opacity: 1;
            }
            100% {
                top: 110vh; /* Конец за экраном */
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="background-final"></div>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
