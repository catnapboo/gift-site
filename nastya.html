<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background-color: #b9dcfa;
      overflow-x: hidden;
    }

    .bg-section {
      width: 100%;
      min-height: 100vh;
      background-image: url('34.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      position: relative;
    }

    /* 35 — теперь это повторяющаяся полоса */
    .section-35 {
      position: absolute;
      top: 0;
      left: -10%; /* Выход за левый край */
      width: 120%; /* Растягиваем больше ширины экрана, чтобы заходило за оба края */
      height: 250px; /* Высота подбирается исходя из того, что картинка в 2 раза меньше оригинала */
      background-image: url('35.png');
      background-repeat: repeat-x; /* Повтор по горизонтали */
      background-size: contain; /* Картинка уменьшается, чтобы вписаться в высоту */
      opacity: 0;
    }

    .wrapper-40 {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 5;
    }

    /* Изображение 40 увеличено до 75% ширины */
    .section-40 {
      width: 75%; 
      opacity: 0;
    }

    .section-40.left {
      transform: scaleX(-1) translateX(20%); /* Увеличен заступ за левый край */
    }

    .section-40.right {
      transform: translateX(20%); /* Увеличен заступ за правый край */
    }

    .section-40 img {
      display: block;
      width: 100%;
    }

    .section-36 {
      position: relative;
      width: 100%;
      opacity: 0;
      z-index: 10;
    }
    .section-36 img {
      width: 100%;
      display: block;
    }

    .section-39 img {
      width: 100%;
      display: block;
      opacity: 0;
    }

    #bg34.fade-in {
      animation: fadeIn 0.5s ease-in forwards;
    }

    .fade-in {
      animation: fadeIn 1.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .flying-image {
      position: fixed;
      top: 0;
      left: -25vw;
      width: 150vw;
      height: 150vw;
      object-fit: cover;
      display: block;
      animation: flyDown 3s ease-in-out forwards;
    }

    @keyframes flyDown {
      0% {
        transform: translateX(0) translateY(-100%);
        opacity: 1;
      }
      70% {
        opacity: 1;
      }
      100% {
        transform: translateX(0) translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="bg-section" id="bg34">
    <!-- Повторяющаяся лента 35 -->
    <div class="section-35" id="section35"></div>
    
    <div class="wrapper-40">
      <div class="section-40 left" id="section40-left">
        <img src="40.png" alt="image 40" />
      </div>
      <div class="section-40 right" id="section40-right">
        <img src="40.png" alt="image 40" />
      </div>
    </div>
  </div>

  <div class="section-36" id="section36">
    <img src="36.png" alt="image 36" />
  </div>

  <div class="section-39" id="section39">
    <img src="39.jpg" alt="image 39" />
  </div>

  <img class="flying-image" src="38.png" alt="flying image" />

  <script>
    setTimeout(() => {
      document.getElementById('bg34').classList.add('fade-in');
      document.getElementById('section35').classList.add('fade-in');

      setTimeout(() => {
        document.getElementById('section40-left').classList.add('fade-in');
        document.getElementById('section40-right').classList.add('fade-in');
        
        setTimeout(() => {
          document.querySelector('#section39 img').classList.add('fade-in');
          document.getElementById('section36').classList.add('fade-in');
        }, 1500);
        
      }, 1500);

    }, 3000);
  </script>

</body>
</html>
