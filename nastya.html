<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            /* Начальная позиция за левым верхним углом */
            top: -900px;
            left: -900px;
            /* Скорость уменьшена (время увеличено до 8 секунд) */
            animation: arc-flow-high 8s ease-in-out forwards;
        }

        @keyframes arc-flow-high {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            /* Пролет через центр */
            50% {
                transform: translate(60vw, 5vh) rotate(30deg);
            }
            85% {
                opacity: 1;
            }
            100% {
                /* Конечная точка выше — улет за правую сторону экрана, а не в самый низ */
                transform: translate(180vw, 30vh) rotate(80deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
