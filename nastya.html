<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .snowflake {
            position: absolute;
            /* Изображение увеличено в 5 раз (с 100px до 500px) */
            width: 500px; 
            height: auto;
            pointer-events: none;
            top: -600px;
            left: -600px;
            /* forwards сохраняет конечное состояние (невидимость), а 1 — проигрывает один раз */
            animation: wind-flow 6s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards;
        }

        @keyframes wind-flow {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            /* Траектория с "петлей" */
            35% {
                transform: translate(40vw, 30vh) rotate(100deg);
            }
            50% {
                transform: translate(55vw, 25vh) rotate(240deg);
            }
            65% {
                transform: translate(45vw, 50vh) rotate(380deg);
            }
            /* Улет за край экрана */
            95% {
                opacity: 1;
            }
            100% {
                transform: translate(150vw, 150vh) rotate(600deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
