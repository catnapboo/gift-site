<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        /* Финальный фон */
        .background-final {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('34.jpg') no-repeat center top;
            background-size: cover;
            opacity: 0;
            /* Появление за 1 сек после того, как 38-е упадет (через 3 сек) */
            animation: fade-in-bg 1s ease-in forwards;
            animation-delay: 3s;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            left: 50%;
            /* Стартовая позиция над экраном */
            top: -900px; 
            transform: translateX(-50%);
            z-index: 2;
            /* Простое падение вниз за 3 секунды */
            animation: simple-fall 3s linear forwards;
        }

        @keyframes fade-in-bg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes simple-fall {
            0% {
                top: -900px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                /* Конечная точка внизу за экраном */
                top: 110vh;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="background-final"></div>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
