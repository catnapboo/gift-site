<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        /* Новый фон 34.jpg */
        .background-final {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('34.jpg') no-repeat center top;
            background-size: cover;
            opacity: 0;
            /* Появляется через 3 секунды (задержка), длится 1 секунду */
            animation: fade-in-bg 1s ease-in forwards;
            animation-delay: 3s;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            left: 50%;
            top: 0;
            z-index: 2; /* Поверх фона */
            animation: 
                fall-down 3s linear forwards,
                sway 0.8s ease-in-out infinite alternate;
        }

        @keyframes fade-in-bg {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fall-down {
            0% {
                top: -800px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                top: 110vh;
                opacity: 0;
            }
        }

        @keyframes sway {
            0% {
                margin-left: -50px;
                transform: translateX(-50%) rotate(-5deg);
            }
            100% {
                margin-left: 50px;
                transform: translateX(-50%) rotate(5deg);
            }
        }
    </style>
</head>
<body>

    <!-- Слой с финальным фоном -->
    <div class="background-final"></div>

    <!-- Падающая снежинка -->
    <img src="38.png" alt="" class="snowflake">

</body>
</html>
