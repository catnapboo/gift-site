<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .snowflake {
            position: absolute;
            width: 800px; 
            height: auto;
            pointer-events: none;
            /* Начальная позиция за левым верхним углом */
            top: -900px;
            left: -900px;
            /* Анимация проигрывается один раз по дуге */
            animation: arc-flow 5s ease-in-out forwards;
        }

        @keyframes arc-flow {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            /* Центральная точка дуги: смещение в центр с прогибом */
            50% {
                transform: translate(60vw, 10vh) rotate(45deg);
            }
            85% {
                opacity: 1;
            }
            100% {
                /* Улет в нижний правый угол */
                transform: translate(180vw, 180vh) rotate(120deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
