<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>New Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden; 
        }

        .snowflake {
            position: absolute;
            /* Еще более крупный размер изображения */
            width: 800px; 
            height: auto;
            pointer-events: none;
            /* Начальная точка глубоко за пределами верхнего левого угла */
            top: -900px;
            left: -900px;
            /* Анимация проигрывается один раз и замирает в конце (forwards) */
            animation: simple-flow 5s linear forwards;
        }

        @keyframes simple-flow {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                /* Улет далеко за нижний правый край */
                transform: translate(180vw, 180vh) rotate(90deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <img src="38.png" alt="" class="snowflake">

</body>
</html>
