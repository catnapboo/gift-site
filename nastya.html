<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background-color: #b9dcfa;
      overflow-x: hidden;
    }

    .bg-section {
      width: 100%;
      min-height: 100vh;
      background-image: url('34.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
    }

    .section-39 img {
      width: 100%;
      display: block;
      opacity: 0;
    }

    .fade-in {
      animation: fadeIn 1.5s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .flying-image {
      position: fixed;
      top: 0;
      left: -25vw;
      width: 150vw;
      height: 150vw;
      object-fit: cover;
      display: block;
      animation: flyDown 3s ease-in-out forwards;
    }

    @keyframes flyDown {
      0% {
        transform: translateY(-100%);
        opacity: 1;
      }
      70% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="bg-section" id="bg34"></div>
  <div class="section-39" id="section39">
    <img src="39.jpg" alt="image 39" />
  </div>

  <img class="flying-image" src="38.png" alt="flying image" />

  <script>
    // После 3с (конец полёта 38) — плавно появляется 34
    setTimeout(() => {
      document.getElementById('bg34').classList.add('fade-in');

      // После появления 34 (1.5с) — плавно появляется 39
      setTimeout(() => {
        document.querySelector('#section39 img').classList.add('fade-in');
      }, 1500);

    }, 3000);
  </script>

</body>
</html>
