<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>New Code</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #b9dcfa;
            overflow: hidden;
        }

        /* Изображение 34.jpg (фон) */
        #final-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('34.jpg') no-repeat center top;
            background-size: cover;
            opacity: 0;
            animation: fadeInBg 1s ease-in forwards;
            animation-delay: 3s;
            z-index: 1;
        }

        /* Изображение 38.png (пролет) */
        #falling-image {
            position: absolute;
            /* Увеличил размер */
            width: 1500px; 
            left: 50%;
            transform: translateX(-50%);
            /* Скорректировал стартовую позицию под новый размер */
            top: -1600px;
            z-index: 2;
            animation: drop 3s linear forwards;
        }

        @keyframes drop {
            0% {
                top: -1600px;
                opacity: 1;
            }
            100% {
                top: 100vh;
                opacity: 0;
            }
        }

        @keyframes fadeInBg {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div id="final-bg"></div>
    <img src="38.png" id="falling-image" alt="">

</body>
</html>
