<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #b9dcfa;
      overflow-x: hidden;
    }

    .flying-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 150vw;
      height: 150vw;
      left: -25vw;
      object-fit: cover;
      display: block;
      animation: flyDown 3s ease-in-out forwards;
    }

    @keyframes flyDown {
      0% {
        transform: translateY(-100%);
        opacity: 1;
      }
      70% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <img class="flying-image" src="38.png" alt="flying image" />

</body>
</html>
