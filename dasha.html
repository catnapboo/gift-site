<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой проект на GitHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #180f2b;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            /* Идеальное центрирование содержимого */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Скрываем полосы прокрутки */
        }

        /* Восстанавливаем аккуратный стиль с ограничениями размера */
        .zoom-image {
            max-width: 90vw; /* Картинка не шире 90% экрана */
            max-height: 90vh; /* Картинка не выше 90% экрана */
            object-fit: contain;
            display: block;

            /* Подключаем новую анимацию, которая исчезнет в конце */
            animation: zoomAndFadeOutIntro 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            
            /* Стартовое состояние (скрыто) */
            transform: scale(0.01);
            opacity: 0;
        }

        /* Новое описание анимации: влет, задержка и исчезновение */
        @keyframes zoomAndFadeOutIntro {
            0% {
                transform: scale(0.01); /* Почти невидимая точка */
                opacity: 0;             /* Полностью прозрачная */
            }
            15% {
                opacity: 1;             /* Быстро проявляется в начале влета */
            }
            80% {
                transform: scale(1.8);  /* Достигает крупного размера (как в 1-й раз) */
                opacity: 1;             /* Все еще полностью видна */
            }
            100% {
                transform: scale(1.8);  /* Сохраняет финальный размер */
                opacity: 0;             /* Плавно исчезает (fade out) к 3-й секунде */
            }
        }
    </style>
</head>
<body>

    <img src="45.png" alt="Приближающееся и исчезающее изображение" class="zoom-image">

</body>
</html>
