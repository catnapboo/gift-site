<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой проект на GitHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #180f2b;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 1. ПЕРВАЯ КАРТИНКА (Влетает и исчезает с 0с до 3с) */
        .zoom-image {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            z-index: 4;
            position: absolute;

            animation: zoomAndFadeOutIntro 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transform: scale(0.01);
            opacity: 0;
        }

        @keyframes zoomAndFadeOutIntro {
            0% { transform: scale(0.01); opacity: 0; }
            15% { opacity: 1; }
            80% { transform: scale(1.8); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* 2. КОНТЕЙНЕР ДЛЯ ТРЕХ ИЗОБРАЖЕНИЙ 47.png */
        .triple-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 3;
            animation: fadeOutContainer 1s ease-in-out 6s forwards;
            opacity: 1;
        }

        .triple-container img {
            width: 100%;
            height: 33.33vh; 
            object-fit: cover;
            opacity: 0;
            animation: fadeInRow 1s ease-in-out forwards;
        }

        .triple-container img:nth-child(1) { animation-delay: 3s; }
        .triple-container img:nth-child(2) { animation-delay: 4s; }
        .triple-container img:nth-child(3) { animation-delay: 5s; }

        @keyframes fadeInRow {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeOutContainer {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 3. ФИНАЛЬНЫЙ ФОН 46.jpg (Проявляется на 7-й секунде) */
        .full-screen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            animation: fadeInBackground 1.5s ease-in-out 7s forwards;
            opacity: 0;
        }

        @keyframes fadeInBackground {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 4. ЗЕРКАЛЬНЫЕ ИЗОБРАЖЕНИЯ 48.png (Появление на 9.5 секунде) */
        .side-element {
            position: absolute;
            top: 35%;             /* Расположение чуть выше середины экрана */
            max-width: 20vw;      /* Ограничиваем размер, чтобы они гармонично смотрелись по бокам */
            height: auto;
            z-index: 2;           /* Находятся поверх фона 46 */
            opacity: 0;           /* Изначально скрыты */
            
            /* Анимация проявления: начинается на 9.5 секунде */
            animation: fadeInSides 1s ease-in-out 9.5s forwards;
        }

        /* Левый элемент */
        .side-element.left {
            left: 5%;             /* Небольшой отступ от левого края */
        }

        /* Правый элемент + зеркальное отражение */
        .side-element.right {
            right: 5%;            /* Небольшой отступ от правого края */
            transform: scaleX(-1); /* Отражаем по горизонтали */
        }

        @keyframes fadeInSides {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <img src="45.png" alt="Приближающееся изображение" class="zoom-image">

    <div class="triple-container">
        <img src="47.png" alt="Полоса 1">
        <img src="47.png" alt="Полоса 2">
        <img src="47.png" alt="Полоса 3">
    </div>

    <img src="46.jpg" alt="Фон страницы" class="full-screen-bg">

    <img src="48.png" alt="Левый элемент" class="side-element left">
    <img src="48.png" alt="Правый элемент" class="side-element right">

</body>
</html>
