<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой проект на GitHub</title>
    <style>
        /* Главный скролл всей страницы */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden; 
            overflow-y: auto; /* Страница свободно листается вниз */
            background-color: #180f2b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        /* 1. ПЕРВАЯ КАРТИНКА (Влетает и исчезает с 0с до 3с) */
        .zoom-image {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            z-index: 5;
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.01);
            opacity: 0;

            animation: zoomAndFadeOutIntro 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes zoomAndFadeOutIntro {
            0% { transform: translate(-50%, -50%) scale(0.01); opacity: 0; }
            15% { opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
        }

        /* 2. КОНТЕЙНЕР ДЛЯ ТРЕХ ИЗОБРАЖЕНИЙ 47.png */
        .triple-container {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 4;
            animation: fadeOutContainer 1s ease-in-out 6s forwards;
            opacity: 1;
            pointer-events: none;
        }

        .triple-container img {
            width: 100%;
            height: 33.33vh; 
            object-fit: cover;
            opacity: 0;
            animation: fadeInRow 1s ease-in-out forwards;
        }

        .triple-container img:nth-child(1) { animation-delay: 3s; }
        .triple-container img:nth-child(2) { animation-delay: 4s; }
        .triple-container img:nth-child(3) { animation-delay: 5s; }

        @keyframes fadeInRow {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeOutContainer {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ГЛАВНЫЙ РОДИТЕЛЬСКИЙ КОНТЕЙНЕР ДЛЯ ПЕРВОГО ЭКРАНА */
        .first-screen-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Занимает ровно один экран */
            z-index: 1;
        }

        /* 3. ФИНАЛЬНЫЙ ФОН 46.jpg */
        .full-screen-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            animation: fadeInBackground 1.5s ease-in-out 7s forwards;
            opacity: 0;
        }

        @keyframes fadeInBackground {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 4. БОКОВЫЕ ЭЛЕМЕНТЫ ВВЕРХУ 48.gif */
        .side-element {
            position: absolute; 
            top: 15%;
            width: 35vw; 
            height: auto;
            z-index: 2;
            opacity: 0;
            pointer-events: none; /* Пропускают клики сквозь себя */
            
            animation: fadeInElements 1s ease-in-out 9.5s forwards;
        }

        .side-element.left {
            left: 2%;
            transform: scaleX(-1);
        }

        .side-element.right {
            right: 2%;
        }

        /* КЛАСС ДЛЯ НИЖНИХ ЭЛЕМЕНТОВ 49.gif */
        .bottom-element {
            position: absolute; 
            bottom: 10%; 
            width: 70vw; 
            height: auto;
            z-index: 2;
            opacity: 0;
            pointer-events: none; /* Пропускают клики сквозь себя */

            animation: fadeInElements 1s ease-in-out 9.5s forwards;
        }

        .bottom-element.left {
            left: -15%; 
            transform: scaleX(-1); 
        }

        .bottom-element.right {
            right: -15%; 
        }

        @keyframes fadeInElements {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 5. НОВЫЙ КАСТОМНЫЙ КРУГЛЫЙ ПРОИГРЫВАТЕЛЬ (#f5cef5) */
        .audio-player-container {
            position: absolute; 
            top: 31%; /* Высота расположения над картинкой 46 */
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            z-index: 99999; /* Абсолютный приоритет по высоте слоев */
            opacity: 0;
            
            animation: fadeInPlayer 1s ease-in-out 9.5s forwards;
        }

        /* Круглая кнопка */
        .pink-play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(245, 206, 245, 0.3); /* Цвет #f5cef5 с прозрачностью */
            border: 3px solid #f5cef5; /* Плотный контур цвета #f5cef5 */
            box-shadow: 0px 0px 20px rgba(245, 206, 245, 0.6), inset 0px 0px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
        }

        .pink-play-btn:hover {
            transform: scale(1.05);
            background: rgba(245, 206, 245, 0.5);
            box-shadow: 0px 0px 25px #f5cef5;
        }

        /* Иконка треугольника (PLAY) */
        .pink-icon-play {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 12px 0 12px 20px;
            border-color: transparent transparent transparent #f5cef5; /* Треугольник цвета #f5cef5 */
            margin-left: 6px; /* Визуальное выравнивание в круге */
            display: block;
        }

        /* Иконка двух полосок (PAUSE) */
        .pink-icon-pause {
            width: 16px;
            height: 22px;
            display: none;
            justify-content: space-between;
        }

        .pink-icon-pause::before, .pink-icon-pause::after {
            content: '';
            width: 5px;
            height: 100%;
            background-color: #f5cef5; /* Полоски цвета #f5cef5 */
            border-radius: 2px;
        }

        /* Переключение состояния при проигрывании */
        .pink-play-btn.playing .pink-icon-play { display: none; }
        .pink-play-btn.playing .pink-icon-pause { display: flex; }

        @keyframes fadeInPlayer {
            0% { opacity: 0; transform: translateX(-50%) scale(0.9); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* ИЗОБРАЖЕНИЕ 50.jpg */
        .next-bg {
            width: 100%;
            height: 37.5vh; 
            object-fit: contain; 
            display: block;
            margin: 0 auto;
            z-index: 1;
            position: relative;
        }
    </style>
</head>
<body>

    <img src="45.png" alt="Приближающееся изображение" class="zoom-image">

    <div class="triple-container">
        <img src="47.png" alt="Полоса 1">
        <img src="47.png" alt="Полоса 3">
        <img src="47.png" alt="Полоса 2">
    </div>

    <div class="first-screen-container">
        <img src="46.jpg" alt="Фон страницы" class="full-screen-bg">

        <img src="48.gif" alt="Левый верхний элемент" class="side-element left">
        <img src="48.gif" alt="Правый верхний элемент" class="side-element right">

        <img src="49.gif" alt="Левый нижний элемент" class="bottom-element left">
        <img src="49.gif" alt="Правый нижний элемент" class="bottom-element right">

        <div class="audio-player-container">
            <div class="pink-play-btn" id="musicBtn">
                <div class="pink-icon-play"></div>
                <div class="pink-icon-pause"></div>
            </div>
            <audio id="audioTrack" src="music.mp3" type="audio/mpeg"></audio>
        </div>
    </div>

    <img src="50.jpg" alt="Следующее изображение ниже" class="next-bg">

    <script>
        const musicBtn = document.getElementById('musicBtn');
        const audioTrack = document.getElementById('audioTrack');

        musicBtn.addEventListener('click', function(e) {
            e.stopPropagation(); // Изолируем клик от фона
            if (audioTrack.paused) {
                audioTrack.play()
                    .then(() => {
                        musicBtn.classList.add('playing');
                    })
                    .catch(err => {
                        console.log("Браузер заблокировал старт:", err);
                    });
            } else {
                audioTrack.pause();
                musicBtn.classList.remove('playing');
            }
        });

        audioTrack.addEventListener('ended', function() {
            musicBtn.classList.remove('playing');
        });
    </script>

</body>
</html>
