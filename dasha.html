<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой проект на GitHub</title>
    <style>
        /* Жесткий сброс и фиксация границ экрана */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #180f2b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 1. ПЕРВАЯ КАРТИНКА (Влетает и исчезает с 0с до 3с) */
        .zoom-image {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            z-index: 5;
            position: absolute;

            animation: zoomAndFadeOutIntro 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            transform: scale(0.01);
            opacity: 0;
        }

        @keyframes zoomAndFadeOutIntro {
            0% { transform: scale(0.01); opacity: 0; }
            15% { opacity: 1; }
            80% { transform: scale(1.8); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* 2. КОНТЕЙНЕР ДЛЯ ТРЕХ ИЗОБРАЖЕНИЙ 47.png */
        .triple-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 4;
            animation: fadeOutContainer 1s ease-in-out 6s forwards;
            opacity: 1;
        }

        .triple-container img {
            width: 100%;
            height: 33.33vh; 
            object-fit: cover;
            opacity: 0;
            animation: fadeInRow 1s ease-in-out forwards;
        }

        .triple-container img:nth-child(1) { animation-delay: 3s; }
        .triple-container img:nth-child(2) { animation-delay: 4s; }
        .triple-container img:nth-child(3) { animation-delay: 5s; }

        @keyframes fadeInRow {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeOutContainer {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* СЛОЙ 0: НОВОЕ ИЗОБРАЖЕНИЕ 50.jpg (Находится НА САМОМ ДНЕ, под фоном 46) */
        .deep-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0; /* Самый низкий приоритет слоя, строго под фоном 46 */
        }

        /* 3. ФИНАЛЬНЫЙ ФОН 46.jpg (Проявляется на 7-й секунде) */
        .full-screen-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; /* На один уровень выше, чем 50.jpg */
            animation: fadeInBackground 1.5s ease-in-out 7s forwards;
            opacity: 0;
        }

        @keyframes fadeInBackground {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 4. БОКОВЫЕ ЭЛЕМЕНТЫ ВВЕРХУ 48.gif (Появление на 9.5 секунде) */
        .side-element {
            position: absolute;
            top: 15%;
            width: 35vw; 
            height: auto;
            z-index: 2;
            opacity: 0;
            pointer-events: none; 
            
            animation: fadeInElements 1s ease-in-out 9.5s forwards;
        }

        .side-element.left {
            left: 2%;
            transform: scaleX(-1);
        }

        .side-element.right {
            right: 2%;
        }

        /* КЛАСС ДЛЯ НИЖНИХ ЭЛЕМЕНТОВ 49.gif */
        .bottom-element {
            position: absolute;
            bottom: 10%; 
            width: 70vw; 
            height: auto;
            z-index: 2;
            opacity: 0;
            pointer-events: none;

            animation: fadeInElements 1s ease-in-out 9.5s forwards;
        }

        .bottom-element.left {
            left: -15%; 
            transform: scaleX(-1); 
        }

        .bottom-element.right {
            right: -15%; 
        }

        @keyframes fadeInElements {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 5. МУЗЫКАЛЬНЫЙ ПЛЕЕР (Появление на 9.5 секунде) */
        .audio-player-container {
            position: absolute;
            top: 31%; 
            z-index: 10; 
            opacity: 0;
            
            animation: fadeInPlayer 1s ease-in-out 9.5s forwards;
        }

        audio {
            width: 300px;
            height: 45px;
            border-radius: 30px;
            background: rgba(241, 243, 244, 0.2); 
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.5);
        }

        @keyframes fadeInPlayer {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <img src="45.png" alt="Приближающееся изображение" class="zoom-image">

    <div class="triple-container">
        <img src="47.png" alt="Полоса 1">
        <img src="47.png" alt="Полоса 3">
        <img src="47.png" alt="Полоса 2">
    </div>

    <img src="50.jpg" alt="Самый нижний фон" class="deep-background">

    <img src="46.jpg" alt="Фон страницы" class="full-screen-bg">

    <img src="48.gif" alt="Левый верхний элемент" class="side-element left">
    <img src="48.gif" alt="Правый верхний элемент" class="side-element right">

    <img src="49.gif" alt="Левый нижний элемент" class="bottom-element left">
    <img src="49.gif" alt="Правый нижний элемент" class="bottom-element right">

    <div class="audio-player-container">
        <audio controls src="music.mp3" type="audio/mpeg"></audio>
    </div>

</body>
</html>
