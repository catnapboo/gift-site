<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой проект на GitHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #180f2b;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            /* Идеальное центрирование в видимой части браузера */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Прячем полосы прокрутки, так как картинка будет огромной */
        }

        .zoom-image {
            /* Убираем жесткие рамки, чтобы картинка могла расти без ограничений */
            display: block;
            
            /* Анимация: 3 секунды, кастомная плавность, фиксация в финальной точке */
            animation: megaZoom 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            
            /* Стартовая точка */
            transform: scale(0);
            opacity: 0;
        }

        @keyframes megaZoom {
            0% {
                transform: scale(0); /* Начинаем с абсолютного нуля */
                opacity: 0;
            }
            10% {
                opacity: 1; /* Картинка мгновенно становится видимой при старте движения */
            }
            100% {
                transform: scale(5); /* Итоговое увеличение ровно в 5 раз */
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <img src="45.png" alt="Приближающееся изображение" class="zoom-image">

</body>
</html>
